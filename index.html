<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LegalTrack">
<title>LegalTrack</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{
  --g:#1A7A52;--gl:#E8F5EE;--b:#2563EB;--bl:#EBF0FE;
  --p:#7C3AED;--pl:#F3F0FF;--o:#D97706;--ol:#FEF3C7;
  --r:#DC2626;--rl:#FEE2E2;--t:#0D9488;--tl:#CCFBF1;
  --gray:#6B7280;--grayl:#F3F4F6;
  --bg:#F8F9FA;--white:#fff;--text:#111827;--text2:#374151;--text3:#9CA3AF;
  --border:#E5E7EB;--shadow:0 1px 3px rgba(0,0,0,.08);--shadow2:0 4px 16px rgba(0,0,0,.08);
  --sb:220px;--r8:8px;--r12:12px;--r16:16px;
  --green:var(--g);--green-l:var(--gl);--blue:var(--b);--blue-l:var(--bl);
  --purple:var(--p);--purple-l:var(--pl);--orange:var(--o);--orange-l:var(--ol);
  --red:var(--r);--red-l:var(--rl);--gold:var(--o);--gold-l:var(--ol);
  --teal:var(--t);--teal-l:var(--tl);
}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--text)}
.layout{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:var(--sb);background:var(--white);border-right:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0}
@media(min-width:768px){.sidebar{display:flex}}
.sb-hdr{padding:18px 16px 12px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.sb-logo-ico{font-size:20px}.sb-logo-txt{font-size:14px;font-weight:800}
.sb-date{font-size:11px;color:var(--text3)}
.sb-stats{padding:8px 14px;border-bottom:1px solid var(--border)}
.sb-srow{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sb-srow-lbl{color:var(--text3)}.sb-srow-val{font-weight:600}
.sb-nav{flex:1;padding:6px 0;overflow-y:auto}
.sbn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text2);text-align:left}
.sbn:hover{background:var(--bg)}.sbn.on{background:var(--gl);color:var(--g);font-weight:600}
.sbn-ico{font-size:15px;width:20px;text-align:center}
.sb-foot{padding:9px 14px;border-top:1px solid var(--border)}
.sb-sync{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px;margin-bottom:4px}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sdot.ok{background:var(--g)}.sdot.err{background:var(--r)}.sdot.sy{background:var(--b);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.mob-hdr{background:var(--g);color:#fff;padding:44px 16px 0;flex-shrink:0}
@media(min-width:768px){.mob-hdr{display:none}}
.mob-hdr-top{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mob-hdr-title{font-size:17px;font-weight:800}
.mob-hdr-date{font-size:11px;opacity:.75;margin-left:auto}
.kpi-scroll{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:14px;scrollbar-width:none}
.kpi-scroll::-webkit-scrollbar{display:none}
.kpi-card{background:rgba(255,255,255,.18);border-radius:var(--r12);padding:10px 14px;flex-shrink:0;min-width:120px;cursor:pointer;border:1px solid rgba(255,255,255,.15);transition:all .15s}
.kpi-card:active{background:rgba(255,255,255,.28)}
.kpi-label{font-size:10px;opacity:.85;margin-bottom:2px;white-space:nowrap;font-weight:600}
.kpi-value{font-size:17px;font-weight:800;line-height:1.1}
.kpi-sub{font-size:9px;opacity:.7;margin-top:2px}
.phdr{display:none;flex-shrink:0}
@media(min-width:768px){.phdr{display:flex;align-items:center;justify-content:space-between;padding:16px 22px 0}}
.phdr-title{font-size:19px;font-weight:800}.phdr-act{display:flex;gap:8px;align-items:center}
.tbanner{background:var(--gl);border-bottom:1px solid #BBE5CF;padding:7px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 1.2s infinite;flex-shrink:0}
.tlbl{font-size:12px;color:var(--g);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ttime{font-family:monospace;font-size:12px;font-weight:700;color:var(--g);margin-right:4px}
.tstop{background:var(--g);color:#fff;border:none;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.syncbar{background:var(--bl);border-bottom:1px solid #BFDBFE;padding:5px 14px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--b);flex-shrink:0}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:13px 14px 90px}
@media(min-width:768px){.content{padding:18px 22px 40px}}
.tabbar{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:max(env(safe-area-inset-bottom),8px);z-index:50}
@media(min-width:768px){.tabbar{display:none}}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;padding:7px 0 0;cursor:pointer;border:none;background:none;gap:2px;font-family:inherit}
.tb-i{font-size:20px;line-height:1}.tb-l{font-size:10px;color:var(--text3);font-weight:500}
.tb.on .tb-l{color:var(--g);font-weight:700}
.fab-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:1px 0 0;cursor:pointer;border:none;background:none;gap:2px;font-family:inherit}
.fab{width:42px;height:42px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;margin-top:-12px;box-shadow:0 4px 12px rgba(26,122,82,.4)}
.fab-l{font-size:9px;color:var(--text3)}
.card{background:var(--white);border-radius:var(--r16);padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}
@media(min-width:768px){.card{padding:18px}}
.cttl{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:13px;font-weight:700;color:var(--text2)}
.sec-meta{font-size:11px;color:var(--text3);font-weight:400;margin-left:4px}
.more-btn{font-size:11px;color:var(--b);background:var(--bl);border:none;border-radius:20px;padding:3px 10px;cursor:pointer;font-family:inherit;font-weight:600}
.divider{height:1px;background:var(--border);margin:12px 0}
.empty{text-align:center;padding:36px 0;color:var(--text3)}
.empty-ico{font-size:30px;display:block;margin-bottom:7px}
/* stat */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
@media(min-width:768px){.sgrid{gap:10px}}
@media(min-width:1024px){.sgrid.c4{grid-template-columns:repeat(4,1fr)}.sgrid.c3{grid-template-columns:repeat(3,1fr)}}
.sc{border-radius:var(--r12);padding:11px 12px;cursor:default}
.sc-l{font-size:11px;line-height:1.3;margin-bottom:3px;opacity:.8}
.sc-v{font-size:18px;font-weight:800;line-height:1.1}
.sc-u{font-size:10px;margin-top:2px;opacity:.7}
.sc.g{background:var(--gl);color:var(--g)}.sc.b{background:var(--bl);color:var(--b)}
.sc.p{background:var(--pl);color:var(--p)}.sc.o,.sc.gold{background:var(--ol);color:var(--o)}
.sc.teal{background:var(--tl);color:var(--t)}.sc.r,.sc.red{background:var(--rl);color:var(--r)}
.sc.gray{background:var(--grayl);color:var(--gray)}
/* matter list item */
.mitem{display:flex;align-items:center;padding:11px 12px;background:var(--white);border-radius:var(--r12);margin-bottom:6px;box-shadow:var(--shadow);cursor:pointer;gap:10px;border-left:3px solid transparent;transition:opacity .15s}
.mitem:active{opacity:.75}
.mitem.g-b{border-left-color:var(--g)}.mitem.p-b{border-left-color:var(--p)}
.mitem.b-b{border-left-color:var(--b)}.mitem.r-b{border-left-color:var(--r)}
.mitem.o-b,.mitem.gold-b{border-left-color:var(--o)}.mitem.gray-b{border-left-color:var(--gray)}
.mitem-body{flex:1;min-width:0}
.mitem-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.mitem-code{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap}
.mitem-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.mitem-client{font-size:11px;color:var(--text3);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mitem-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mitem-amt{font-size:13px;font-weight:700}.mitem-arr{font-size:18px;color:var(--text3);flex-shrink:0}
/* tags */
.tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.tag.g{background:var(--gl);color:var(--g)}.tag.p{background:var(--pl);color:var(--p)}
.tag.b{background:var(--bl);color:var(--b)}.tag.r,.tag.red{background:var(--rl);color:var(--r)}
.tag.o,.tag.gold,.tag.orange{background:var(--ol);color:var(--o)}
.tag.teal{background:var(--tl);color:var(--t)}.tag.gray{background:var(--grayl);color:var(--gray)}
/* buttons */
.add-btn{width:100%;padding:11px;border:none;border-radius:var(--r12);color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:10px;font-family:inherit;background:var(--g);box-shadow:var(--shadow)}
.add-btn:active{opacity:.85}.add-btn.out{background:var(--white);color:var(--g);border:1.5px solid var(--g);box-shadow:none}
@media(min-width:768px){.add-btn{max-width:260px}}
.mbtn{padding:5px 11px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:inherit;white-space:nowrap}
.mbtn:active{opacity:.7}
.mbtn.g{background:var(--g);border-color:var(--g);color:#fff}.mbtn.p{background:var(--p);border-color:var(--p);color:#fff}
.mbtn.gold,.mbtn.o{background:var(--o);border-color:var(--o);color:#fff}.mbtn.red,.mbtn.r{background:var(--r);border-color:var(--r);color:#fff}
.mbtn.teal,.mbtn.t{background:var(--t);border-color:var(--t);color:#fff}.mbtn.run{background:var(--gl);border-color:var(--g);color:var(--g)}
/* forms */
.field{margin-bottom:10px}.field label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;font-size:15px;border:none;border-radius:var(--r8);background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--g);outline-offset:-1px}
.field textarea{resize:none;line-height:1.5}.field-row{display:flex;gap:7px}.field-row .field{flex:1}
.field .cs{flex:0 0 85px!important}.hint{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.5}
.conv{font-size:12px;color:var(--g);font-weight:700;margin-top:2px;min-height:14px}
.crow{display:flex;align-items:center;gap:9px;padding:1px 0 10px}
.crow input[type=checkbox]{width:18px;height:18px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.crow label{font-size:13px;cursor:pointer}
.tt{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
.tt-b{padding:9px 6px;border-radius:var(--r8);border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;text-align:center;transition:all .15s}
.tt-b.on.g{background:var(--gl);border-color:var(--g);color:var(--g)}.tt-b.on.p{background:var(--pl);border-color:var(--p);color:var(--p)}
.tt-b.on.b{background:var(--bl);border-color:var(--b);color:var(--b)}.tt-b.on.r,.tt-b.on.red{background:var(--rl);border-color:var(--r);color:var(--r)}
.tt-b.on.gold,.tt-b.on.o{background:var(--ol);border-color:var(--o);color:var(--o)}.tt-b.on.gray{background:var(--grayl);border-color:var(--gray);color:var(--gray)}
.tt-b.on.teal{background:var(--tl);border-color:var(--t);color:var(--t)}
.tt-ico{font-size:18px;display:block;margin-bottom:2px}.tt-lbl{font-size:11px;font-weight:700}.tt-sub{font-size:9px;color:var(--text3);margin-top:1px}
.cur-row{display:flex;gap:5px;align-items:flex-end}.cur-row .field{flex:1}.cur-row .field.cs{flex:0 0 85px}
/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.mbg{align-items:center}}
.msh{background:var(--bg);border-radius:20px 20px 0 0;padding:13px 15px;width:100%;max-width:600px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),22px)}
@media(min-width:768px){.msh{border-radius:var(--r16);max-height:90vh;padding:20px 24px 24px}}
.mhdl{width:32px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 12px}
@media(min-width:768px){.mhdl{display:none}}
.mttl{font-size:15px;font-weight:800;text-align:center;margin-bottom:13px}
@media(min-width:768px){.mttl{text-align:left;font-size:17px}}
.savebtn{width:100%;padding:13px;border:none;border-radius:var(--r12);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--g);margin-top:2px}
.savebtn:active{opacity:.85}.savebtn.red{background:var(--r)}.savebtn.gold,.savebtn.o{background:var(--o)}.savebtn.teal,.savebtn.t{background:var(--t)}
.cancelbtn{width:100%;padding:10px;background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;font-family:inherit;text-align:center;margin-top:2px}
.wbox{background:var(--ol);border-radius:var(--r8);padding:9px 11px;font-size:12px;color:var(--o);margin-bottom:10px;line-height:1.5}
.ibox{background:var(--bl);border-radius:var(--r8);padding:9px 11px;font-size:12px;color:var(--b);margin-bottom:10px;line-height:1.5}
.rbox{background:var(--rl);border-radius:var(--r8);padding:9px 11px;font-size:12px;color:var(--r);margin-bottom:10px;line-height:1.5}
.gbox{background:var(--gl);border-radius:var(--r8);padding:9px 11px;font-size:12px;color:var(--g);margin-bottom:10px;line-height:1.5}
.fbar{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.fbar input,.fbar select{flex:1;min-width:90px;padding:8px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--r8);background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none}
.stab-bar{display:flex;margin-bottom:12px;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
.stab-bar::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:600;background:none;border:none;cursor:pointer;color:var(--text3);font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.stab.on{color:var(--g);border-bottom-color:var(--g)}
.entry,.erow{padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:9px;align-items:flex-start}
.entry:last-child,.erow:last-child{border-bottom:none;padding-bottom:0}
.edot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.ebody{flex:1;min-width:0}
.ecode{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px;display:inline-block;margin-bottom:2px}
.edesc{font-size:12px;color:var(--text);line-height:1.4;margin-bottom:2px;word-break:break-all}
.emeta{font-size:11px;color:var(--text3);display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.etm{font-size:11px;font-weight:700;margin-left:auto;white-space:nowrap}
.btag{font-size:10px;padding:1px 5px;border-radius:10px}
.eact{display:flex;gap:1px;flex-shrink:0}
.icobtn{background:none;border:none;cursor:pointer;padding:3px;font-size:15px;line-height:1}
.pay-row{display:flex;align-items:center;gap:7px;padding:7px 10px;background:var(--bg);border-radius:var(--r8);margin-bottom:5px}
.prog-bar,.ret-bar{height:4px;background:rgba(0,0,0,.08);border-radius:2px;overflow:hidden;margin-top:5px}
.prog-fill,.ret-fill{height:100%;border-radius:2px;background:var(--t);transition:width .5s}
.brow{margin-bottom:8px}.brow:last-child{margin-bottom:0}
.blbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.btrk{height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.bfil{height:100%;border-radius:3px;transition:width .5s}
.wwrap{display:flex;gap:3px;align-items:flex-end;height:72px;margin-bottom:5px}
@media(min-width:768px){.wwrap{height:100px;gap:5px}}
.wc{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end}
.wb{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .4s}
.wd{font-size:9px;color:var(--text3);text-align:center}.wv{font-size:9px;font-weight:700}
.cur-summary{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.cur-pill{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600}
.cur-pill.krw{background:var(--gl);color:var(--g)}.cur-pill.usd{background:var(--bl);color:var(--b)}.cur-pill.cny{background:var(--rl);color:var(--r)}
.ach-compare{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.ach-box{border-radius:var(--r12);padding:12px}
.ach-box.retainer{background:var(--ol);border:1.5px solid var(--o)}
.ach-box.payment{background:var(--tl);border:1.5px solid var(--t)}
.ach-box-ttl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.ach-box.retainer .ach-box-ttl{color:var(--o)}.ach-box.payment .ach-box-ttl{color:var(--t)}
.ach-box-val{font-size:16px;font-weight:800;line-height:1.2;margin-bottom:3px}
.ach-box.retainer .ach-box-val{color:var(--o)}.ach-box.payment .ach-box-val{color:var(--t)}
.ach-box-sub{font-size:10px;color:var(--text3)}
.two-col{display:block}@media(min-width:1100px){.two-col{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}}
.three-col{display:block}@media(min-width:1000px){.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:start}}
.dash-grid{display:grid;grid-template-columns:1fr;gap:10px;align-items:start}
@media(min-width:768px){.dash-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1100px){.dash-grid{grid-template-columns:1fr 1fr 1fr}}
.reason-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:18px;background:var(--rl);color:var(--r);font-weight:600;margin:1px 2px}
.dropzone{border:2px dashed var(--border);border-radius:var(--r12);padding:24px;text-align:center;cursor:pointer;margin-bottom:10px}
.dropzone:hover,.dropzone.drag{border-color:var(--g);background:var(--gl)}
.dropzone-ico{font-size:28px;display:block;margin-bottom:6px}.dropzone-txt{font-size:13px;color:var(--text3)}
@media(max-width:767px){
  html,body{font-size:16px}
  .mitem-name{font-size:15px!important}
  .mitem-amt{font-size:14px!important}
  .sc-v{font-size:20px!important}
  .kpi-value{font-size:18px!important}
  .field input,.field select,.field textarea{font-size:16px!important}
  .savebtn{font-size:16px!important;padding:15px!important}
  .tag{font-size:11px!important;padding:3px 8px!important}
  .tb-i{font-size:21px!important}.tb-l{font-size:11px!important}
  .edesc{font-size:13px!important}.emeta{font-size:12px!important}

<script>
const CFG_KEY='lt_cfg_v7',LOCAL_KEY='lt_data_v7';
let CFG={supaUrl:'',supaKey:'',usdKrw:1380,cnyKrw:190,ghToken:'',ghRepo:'kjsh1028/Legaltrack',ghBranch:'main'};
let D={matters:[],entries:[],payments:[]};
let curTab=0,timerObj=null,timerIv=null;
let dashExpand={prospect:false,active:false,closed:false};
// Achievement period filter
const _y=new Date().getFullYear();
let achFilter={preset:'올해',from:_y+'-01-01',to:_y+'-12-31'};
// Incentive tiers (customizable) - format: {threshold(KRW), rate(%)}
let incentiveTiers=[
  {threshold:0,rate:0,label:'기본'},
  {threshold:100000000,rate:3,label:'1억 이상'},
  {threshold:200000000,rate:5,label:'2억 이상'},
  {threshold:300000000,rate:7,label:'3억 이상'},
  {threshold:500000000,rate:10,label:'5억 이상'},
];
try{const s=localStorage.getItem(CFG_KEY);if(s)CFG={...CFG,...JSON.parse(s)};}catch(e){}
const CUR_SYM={KRW:'₩',USD:'$',CNY:'¥'};
function toKRW(a,cur,ro){if(!a||isNaN(a))return 0;const v=parseFloat(a);if(cur==='USD')return Math.round(v*(ro||CFG.usdKrw));if(cur==='CNY')return Math.round(v*(ro||CFG.cnyKrw));return Math.round(v);}
function fmtM(a,cur){if(!a||isNaN(a))return'—';return CUR_SYM[cur||'KRW']+Number(a).toLocaleString('ko-KR');}
function fmtK(v){return'₩'+Math.round(v||0).toLocaleString('ko-KR');}
function groupByCur(items,amtFn,curFn){const g={KRW:0,USD:0,CNY:0};items.forEach(m=>{const a=amtFn(m),c=curFn(m)||'KRW';if(a&&!isNaN(a))g[c]=(g[c]||0)+parseFloat(a);});return g;}
function renderCurPills(g,showTotal){
  const parts=[];
  if(g.KRW>0)parts.push(`<span class="cur-pill krw">${fmtM(g.KRW,'KRW')}</span>`);
  if(g.USD>0)parts.push(`<span class="cur-pill usd">${fmtM(g.USD,'USD')}</span>`);
  if(g.CNY>0)parts.push(`<span class="cur-pill cny">${fmtM(g.CNY,'CNY')}</span>`);
  const total=Math.round((g.KRW||0)+(g.USD||0)*CFG.usdKrw+(g.CNY||0)*CFG.cnyKrw);
  if(showTotal&&(g.USD>0||g.CNY>0))parts.push(`<span class="cur-pill krw" style="opacity:.7">합계≈${fmtK(total)}</span>`);
  return`<div class="cur-summary">${parts.join('')}</div>`;
}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function hhmm(m){if(!m)return'0m';const h=Math.floor(m/60),mm=m%60;return h>0?(mm>0?h+'h '+mm+'m':h+'h'):mm+'m';}
function parseMins(v){v=String(v||'').trim();if(!v)return 0;const hm=v.match(/^(\d+)[h:시간](\d*)m?$/i);if(hm)return parseInt(hm[1])*60+(parseInt(hm[2])||0);const f=parseFloat(v.replace(/,/g,''));if(!isNaN(f)&&f>0)return f<20?Math.round(f*60):Math.round(f);return 0;}
function fmtDF(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.getFullYear()+'.'+(dt.getMonth()+1)+'.'+dt.getDate();}
function fmtD(d){if(!d)return'';const dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'월'+dt.getDate()+'일';}
function addCommas(v){return v.replace(/\D/g,'').replace(/\B(?=(\d{3})+(?!\d))/g,',');}
function numInput(el){el.value=addCommas(el.value);}
function getRaw(id){return parseFloat((document.getElementById(id)?.value||'0').replace(/,/g,''))||0;}
function statsNow(){const now=new Date(),ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);const ms=new Date(now.getFullYear(),now.getMonth(),1);return{today:D.entries.filter(e=>e.date===today()).reduce((s,e)=>s+e.minutes,0),week:D.entries.filter(e=>new Date(e.date+'T00:00:00')>=ws).reduce((s,e)=>s+e.minutes,0),month:D.entries.filter(e=>new Date(e.date+'T00:00:00')>=ms).reduce((s,e)=>s+e.minutes,0),total:D.entries.reduce((s,e)=>s+e.minutes,0)};}
async function fetchLiveRates(){try{const r=await fetch('https://open.er-api.com/v6/latest/KRW');const d=await r.json();if(d.rates?.USD){CFG.usdKrw=Math.round(1/d.rates.USD);CFG.cnyKrw=Math.round(1/d.rates.CNY);saveCFG();return true;}}catch(e){}try{const r=await fetch('https://api.exchangerate-api.com/v4/latest/KRW');const d=await r.json();if(d.rates?.USD){CFG.usdKrw=Math.round(1/d.rates.USD);CFG.cnyKrw=Math.round(1/d.rates.CNY);saveCFG();return true;}}catch(e){}return false;}
const MTYPE={
  'time-b':{label:'Time Billing',ico:'⏱',cls:'time-b',tagCls:'g',color:'var(--green)'},
  'fixed-f':{label:'Fixed Fee',ico:'💰',cls:'fixed-f',tagCls:'p',color:'var(--purple)'},
  'litigation':{label:'소송',ico:'⚖️',cls:'litigation',tagCls:'red',color:'var(--red)'},
  'retainer':{label:'연간 자문',ico:'📅',cls:'retainer',tagCls:'b',color:'var(--blue)'},
  'biz-b':{label:'Biz Building',ico:'🤝',cls:'biz-b',tagCls:'gold',color:'var(--gold)'},
  'office-i':{label:'Office 내부',ico:'🏢',cls:'office-i',tagCls:'gray',color:'var(--gray)'}
};
const MSTATUS={'prospect':{label:'수임 진행중',tagCls:'orange'},'active':{label:'수임 완료',tagCls:'g'},'closed':{label:'딜 클로징',tagCls:'teal'},'failed':{label:'수임 실패',tagCls:'red'},'internal':{label:'비빌링',tagCls:'gray'}};
const ATYPE={'solo':{label:'단독 수임',desc:'100%'},'china-collab':{label:'중국 관련 협업',desc:'전체 100%'},'korea-collab':{label:'순수 한국 건 협업',desc:'내 비율'},'team-originate':{label:'타팀 발굴 공동',desc:'내 비율'},'team-referral':{label:'타팀 수임→우리 실행',desc:'실제 빌링'},'kjm-jya':{label:'김정민/주영애 수임',desc:'100%'},'biz':{label:'Biz Building',desc:'해당없음'},'office':{label:'Office 내부',desc:'해당없음'}};
const FAIL_REASONS=['보수 조건 불일치','다른 로펌 선택','예산 부족','프로젝트 취소','의뢰인 내부 결정','경쟁입찰 패배','연락 두절','기타'];
function getRetainerBase(m){
  if(m.type==='time-b')return{amount:m.cap_amount||m.estimated_amount||0,currency:m.cap_cur||'KRW'};
  if(m.type==='retainer')return{amount:m.ret_total||0,currency:m.ret_cur||m.retainer_cur||'KRW'};
  // litigation: base = 착수금 + 잔금 (성공보수 제외)
  if(m.type==='litigation'){
    const base=(parseFloat(m.lit_retainer||0)+parseFloat(m.lit_balance||0));
    return{amount:base||0,currency:m.retainer_cur||'KRW'};
  }
  return{amount:m.retainer_amount||0,currency:m.retainer_cur||'KRW'};
}
// 성공보수 예정액 (업적에서 제외, 별도 표시)
function getContingency(m){
  if(!m.contingency_amount)return null;
  return{amount:parseFloat(m.contingency_amount||0),currency:m.retainer_cur||'KRW',condition:m.contingency_condition||''};
}
// 전체 성공보수 합계 (모든 Matter)
function totalContingencyKRW(){
  return D.matters.filter(m=>m.contingency_amount&&!['failed','internal'].includes(m.status))
    .reduce((a,m)=>a+toKRW(m.contingency_amount,m.retainer_cur),0);
}
function retainerKRW(m){if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;const b=getRetainerBase(m);return applyRatio(toKRW(b.amount,b.currency),m);}
function paymentKRW(m){if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;const paid=(D.payments||[]).filter(p=>p.matterId===m.id).reduce((s,p)=>s+(p.krw_amount||0),0);return applyRatio(paid,m);}
function applyRatio(base,m){const ratio=(parseFloat(m.my_ratio)||100)/100;const at=m.achievement_type||'solo';if(['solo','china-collab','kjm-jya'].includes(at))return Math.round(base);if(['korea-collab','team-originate'].includes(at))return Math.round(base*ratio);if(at==='team-referral')return toKRW(m.billed_amount||0,m.billed_cur||'KRW');return 0;}
function rawRetainerKRW(m){const b=getRetainerBase(m);return toKRW(b.amount,b.currency);}
function payProgress(m){const cap=rawRetainerKRW(m);if(!cap)return null;const paid=(D.payments||[]).filter(p=>p.matterId===m.id).reduce((s,p)=>s+(p.krw_amount||0),0);return{paid,cap,pct:Math.min(100,Math.round(paid/cap*100))};}
function localSave(){try{localStorage.setItem(LOCAL_KEY,JSON.stringify(D));}catch(e){}}
function localLoad(){try{const r=localStorage.getItem(LOCAL_KEY);if(r){D={matters:[],entries:[],payments:[],...JSON.parse(r)};return;}const OLD=['lt_data_v6','lt_data_v5','lt_data_v4','lt_data_v3','lt_local_v3','lt_local_v2','lt_standalone_v1','lt_v4','lt_v3'];const mMap={},eMap={},pMap={};for(const k of OLD){try{const s=localStorage.getItem(k);if(!s)continue;const p=JSON.parse(s);(p.matters||[]).forEach(m=>{if(!mMap[m.id])mMap[m.id]=m;});(p.entries||[]).forEach(e=>{if(!eMap[e.id])eMap[e.id]=e;});(p.payments||[]).forEach(p2=>{if(!pMap[p2.id])pMap[p2.id]=p2;});}catch(e2){}}D={matters:Object.values(mMap),entries:Object.values(eMap),payments:Object.values(pMap)};if(D.matters.length||D.entries.length){localSave();OLD.forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});}}catch(e){}}
function saveCFG(){localStorage.setItem(CFG_KEY,JSON.stringify(CFG));}
async function sbFetch(path,opts={}){if(!CFG.supaUrl||!CFG.supaKey)return null;const res=await fetch(CFG.supaUrl+'/rest/v1/'+path,{...opts,headers:{'apikey':CFG.supaKey,'Authorization':'Bearer '+CFG.supaKey,'Content-Type':'application/json','Prefer':opts.prefer||'return=representation',...(opts.headers||{})}});if(!res.ok)throw new Error(await res.text());return(res.headers.get('content-type')||'').includes('json')?res.json():null;}
function showSync(s,msg){const sd=document.getElementById('sbDot'),st=document.getElementById('sbSyncTxt');if(sd)sd.className='sdot'+(s==='ok'?' ok':s==='err'?' err':s==='sy'?' sy':'');if(st&&s!=='none')st.textContent=msg||(CFG.ghToken?'GitHub 모드':(CFG.supaUrl?'Supabase 모드':'로컬 모드'));const bar=document.getElementById('syncBar'),dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');if(!bar)return;if(s==='none'){bar.style.display='none';return;}bar.style.display='flex';if(dot)dot.className='sdot'+(s==='ok'?' ok':s==='err'?' err':'');if(txt)txt.textContent=msg||'';if(s==='ok')setTimeout(()=>showSync('none'),3000);if(s==='err')setTimeout(()=>showSync('none'),8000);}
async function syncCloud(){
  if(!CFG.supaUrl){localLoad();return;}
  showSync('sy','연결 중...');
  try{
    const matters=await sbFetch('lt_matters?order=created_at');
    const entries=await sbFetch('lt_entries?order=date.desc');
    let payments=[];
    try{payments=await sbFetch('lt_payments?order=date.desc')||[];}catch(e2){payments=[];}
    D.matters=matters||[];D.entries=entries||[];D.payments=payments;
    localSave();showSync('ok','✓ 동기화 완료');
  }catch(e){
    console.error('Sync error:',e.message);
    localLoad();
    showSync('err','연결 실패: '+e.message.slice(0,50));
  }}
async function cloudSave(type,obj,action='upsert'){
  localSave();
  if(CFG.ghToken){ghSave();return;}
  if(!CFG.supaUrl)return;showSync('sy','저장 중...');try{const t={matter:'lt_matters',entry:'lt_entries',payment:'lt_payments'}[type];if(action==='del')await sbFetch(t+'?id=eq.'+obj.id,{method:'DELETE',prefer:'return=minimal'});else await sbFetch(t,{method:'POST',body:JSON.stringify(obj),prefer:'resolution=merge-duplicates,return=representation'});showSync('ok','✓ 저장됨');}catch(e){showSync('err','저장 실패');}}

/* ── GitHub Sync ── */
async function ghFetch(path, opts={}){
  if(!CFG.ghToken)return null;
  const res=await fetch('https://api.github.com/repos/'+CFG.ghRepo+path,{
    ...opts,
    headers:{'Authorization':'token '+CFG.ghToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json',...(opts.headers||{})}
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.json();
}
async function ghLoad(){
  if(!CFG.ghToken)return false;
  showSync('sy','GitHub 불러오는 중...');
  try{
    const r=await ghFetch('/contents/legaltrack-data.json');
    const raw=atob(r.content.split('\n').join(''));
    const bytes=new Uint8Array(raw.length).map((_,i)=>raw.charCodeAt(i));
    const decoded=JSON.parse(new TextDecoder().decode(bytes));
    // Compare local vs GitHub - use whichever has more data
    const localMatters=D.matters||[];
    const localEntries=D.entries||[];
    const ghMatters=decoded.matters||[];
    const ghEntries=decoded.entries||[];
    
    // Merge: combine both, deduplicate by id, keep GitHub version if conflict
    const mergeById=(local, remote)=>{
      const map={};
      local.forEach(x=>{if(x.id)map[x.id]=x;});
      remote.forEach(x=>{if(x.id)map[x.id]=x;}); // GitHub wins on conflict
      return Object.values(map);
    };
    
    D.matters=mergeById(localMatters, ghMatters);
    D.entries=mergeById(localEntries, ghEntries);
    D.payments=mergeById(D.payments||[], decoded.payments||[]);
    D._ghSha=r.sha;
    localSave();
    
    // If local had more data, re-save to GitHub
    if(localMatters.length>ghMatters.length||localEntries.length>ghEntries.length){
      console.log('Local has newer data, syncing to GitHub...');
      setTimeout(()=>ghSave(),1000);
    }
    
    showSync('ok','✓ GitHub 동기화 완료');
    return true;
  }catch(e){
    if(e.message.includes('404')){
      // File doesn't exist yet - that's OK
      showSync('ok','✓ GitHub 연결됨 (새 저장소)');
      return true;
    }
    console.error('ghLoad error:',e.message);
    showSync('err','GitHub 연결 실패');
    return false;
  }
}
async function ghSave(){
  if(!CFG.ghToken)return;
  showSync('sy','GitHub 저장 중...');
  try{
    // Always use current D state at time of save
    const saveData={matters:[...D.matters],entries:[...D.entries],payments:[...D.payments]};
    const jsonStr=JSON.stringify(saveData,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    const binStr=Array.from(bytes).map(b=>String.fromCharCode(b)).join('');
    const content_b64=btoa(binStr);
    const body={message:'LegalTrack data update '+new Date().toISOString(),content:content_b64,branch:CFG.ghBranch};
    if(D._ghSha)body.sha=D._ghSha;
    const r=await ghFetch('/contents/legaltrack-data.json',{method:'PUT',body:JSON.stringify(body)});
    D._ghSha=r.content.sha;
    showSync('ok','✓ 저장 완료');
  }catch(e){
    console.error('ghSave error:',e.message);
    showSync('err','GitHub 저장 실패: '+e.message.slice(0,40));
  }
}

  if(CFG.ghToken)await ghLoad();

}
function renderAll(){
  const now=new Date();
  const ds=now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';
  const s=statsNow();
  const activeM=D.matters.filter(m=>['active','closed'].includes(m.status));
  const prospectM=D.matters.filter(m=>m.status==='prospect');
  const retKRW=activeM.reduce((a,m)=>a+retainerKRW(m),0);
  const payKRW=activeM.reduce((a,m)=>a+paymentKRW(m),0);
  const contKRW=D.matters.filter(m=>m.contingency_amount&&!['failed','internal'].includes(m.status))
    .reduce((a,m)=>a+toKRW(parseFloat(m.contingency_amount||0),m.retainer_cur||'KRW'),0);
  // Sidebar status
  const _sd=document.getElementById('sbDot'),_st=document.getElementById('sbSyncTxt');
  if(_sd)_sd.className='sdot'+(CFG.ghToken||CFG.supaUrl?'ok':'');
  if(_st)_st.textContent=CFG.ghToken?'🐙 GitHub':(CFG.supaUrl?'☁️ Supabase':'로컬 모드');
  const sd2=document.getElementById('sbDate');if(sd2)sd2.textContent=ds;
  const md=document.getElementById('mobDate');if(md)md.textContent=ds;

function setAchPeriod(p){
  const y=new Date().getFullYear();
  achFilter.preset=p;
  if(p==='올해'){achFilter.from=y+'-01-01';achFilter.to=y+'-12-31';}
  else if(p==='상반기'){achFilter.from=y+'-01-01';achFilter.to=y+'-06-30';}
  else if(p==='하반기'){achFilter.from=y+'-07-01';achFilter.to=y+'-12-31';}
  else if(p==='올해전체'){achFilter.from='';achFilter.to='';}
  else if(p==='직접입력'){/* keep current dates */}
  renderTab(3);
}
function applyAchFilter(){
  achFilter.from=document.getElementById('achFrom')?.value||'';
  achFilter.to=document.getElementById('achTo')?.value||'';
  const el=document.getElementById('achMain');
  if(el)el.innerHTML=renderAchMain();
}

function filterMattersForPeriod(matters){
  if(!achFilter.from&&!achFilter.to)return matters;
  // For retainer: use matter's creation date or closed_date
  // For payments: filter payment dates within range
  // We filter matters that have ANY payment in the period OR were active/closed in period
  return matters.filter(m=>{
    if(achFilter.from||achFilter.to){
      // Check if any payment falls in range
      const pays=(D.payments||[]).filter(p=>p.matterId===m.id);
      if(pays.length>0){
        const hasPayInRange=pays.some(p=>{
          if(achFilter.from&&p.date<achFilter.from)return false;
          if(achFilter.to&&p.date>achFilter.to)return false;
          return true;
        });
        if(hasPayInRange)return true;
      }
      // Also include matters with retainer that were entered in range (use matter id timestamp)
      // For retainer-based: include all active/closed matters (period applies to payments only)
      if(retainerKRW(m)>0)return true;
    }
    return true;
  });
}

function retainerKRWInPeriod(m){
  if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;
  // Retainer is always counted in full for the period (수임액 기준)
  return retainerKRW(m);
}

function paymentKRWInPeriod(m){
  if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;
  // Filter payments by date range
  let pays=(D.payments||[]).filter(p=>p.matterId===m.id);
  if(achFilter.from)pays=pays.filter(p=>p.date>=achFilter.from);
  if(achFilter.to)pays=pays.filter(p=>p.date<=achFilter.to);
  const paid=pays.reduce((s,p)=>s+(p.krw_amount||0),0);
  return applyRatio(paid,m);
}

/* ── Report ── */
function renderReport(){
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=d.toISOString().slice(0,10);const mins=D.entries.filter(e=>e.date===ds).reduce((a,e)=>a+e.minutes,0);days.push({lbl:['일','월','화','수','목','금','토'][d.getDay()],mins,isToday:i===0});}
  const maxD=Math.max(...days.map(d=>d.mins),1);
  const total=D.entries.reduce((a,e)=>a+e.minutes,0);
  const billable=D.entries.filter(e=>e.billable).reduce((a,e)=>a+e.minutes,0);
  const activeM=D.matters.filter(m=>['active','closed'].includes(m.status));
  const retByCur=groupByCur(activeM,m=>getRetainerBase(m).amount,m=>getRetainerBase(m).currency);
  const retKRW=activeM.reduce((a,m)=>a+retainerKRW(m),0);
  const payByCur={};(D.payments||[]).filter(p=>{const m=D.matters.find(x=>x.id===p.matterId);return m&&['active','closed'].includes(m.status);}).forEach(p=>{payByCur[p.currency||'KRW']=(payByCur[p.currency||'KRW']||0)+parseFloat(p.amount||0);});
  const payKRW=activeM.reduce((a,m)=>a+paymentKRW(m),0);
  const mRows=D.matters.filter(m=>m.status!=='failed').map(m=>{const mins=D.entries.filter(e=>e.matterId===m.id).reduce((a,e)=>a+e.minutes,0);return{m,mins};}).filter(x=>x.mins>0).sort((a,b)=>b.mins-a.mins);
  return`
<div class="card" style="border-left:4px solid var(--gold)">
  <div class="cttl">업적 요약 (현재 기준)</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">
    <div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">💼 수임액 (오늘 환율 KRW 환산)</div>
      ${renderCurPills(retByCur,false)}
      <div style="font-size:13px;font-weight:700;color:var(--gold);margin-top:4px">합계 ≈ ${fmtK(retKRW)}</div>
    </div>
    <div>
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">💰 입금액 (입금일 환율 KRW 환산)</div>
      ${renderCurPills(payByCur,false)}
      <div style="font-size:13px;font-weight:700;color:var(--teal);margin-top:4px">합계 ≈ ${fmtK(payKRW)}</div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--text2)">미입금 ≈ <b style="color:var(--orange)">${fmtK(retKRW-payKRW)}</b> · 완료+클로징 ${activeM.length}건</div>
</div>
<div class="three-col">
<div class="card"><div class="cttl">최근 7일</div><div class="wwrap">
${days.map(d=>`<div class="wc"><div class="wv" style="color:${d.isToday?'var(--blue)':'var(--green)'}">${d.mins>0?hhmm(d.mins):''}</div><div class="wb" style="height:${Math.max(d.mins/maxD*65,d.mins>0?3:2)}px;opacity:${d.mins>0?1:.15};background:${d.isToday?'var(--blue)':'var(--green)'}"></div><div class="wd" style="color:${d.isToday?'var(--blue)':'var(--text3)'};font-weight:${d.isToday?700:400}">${d.lbl}</div></div>`).join('')}
</div></div>
<div class="card"><div class="cttl">청구 요약</div>
<div style="display:flex;gap:7px"><div class="sc g" style="flex:1;padding:9px"><div class="sc-l">청구가능</div><div class="sc-v" style="font-size:16px">${hhmm(billable)}</div></div><div class="sc p" style="flex:1;padding:9px"><div class="sc-l">비청구</div><div class="sc-v" style="font-size:16px">${hhmm(total-billable)}</div></div></div></div>
<div class="card"><div class="cttl">Matter별 시간</div>
${mRows.length===0?`<div style="color:var(--text3);font-size:12px;text-align:center;padding:8px 0">없음</div>`:
mRows.slice(0,8).map(({m,mins})=>{const pct=total>0?Math.round(mins/total*100):0;const mt=MTYPE[m.type||'time-b'];const rb=getRetainerBase(m);const amtD=rb.amount?fmtM(rb.amount,rb.currency):'';
  return`<div class="brow"><div class="blbl"><span style="font-size:11px"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${mt.color};margin-right:4px"></span>[${m.code}] ${m.name}${amtD?` <span style="color:var(--text3);font-size:9px">(${amtD})</span>`:''}</span><b style="color:${mt.color};font-size:11px">${hhmm(mins)}</b></div><div class="btrk"><div class="bfil" style="width:${pct}%;background:${mt.color}"></div></div></div>`;}).join('')}
</div>
</div>
<button class="add-btn out" style="margin-top:4px" onclick="openExportModal()">📥 내보내기</button>`;}

/* ── Timer ── */
function startTimer(mid){if(timerObj)return;timerObj={matterId:mid,start:Date.now()};clearInterval(timerIv);timerIv=setInterval(()=>{if(!timerObj)return;const s=Math.floor((Date.now()-timerObj.start)/1000);const h=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;const el=document.getElementById('tTime');if(el)el.textContent=`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;},1000);renderTimerBanner();renderTab(curTab);}
function stopTimer(){if(!timerObj)return;clearInterval(timerIv);timerIv=null;const mins=Math.max(1,Math.round((Date.now()-timerObj.start)/60000));const mid=timerObj.matterId;timerObj=null;renderTimerBanner();openEntryModal(mid,mins);}

  let defT='';if(prefillMins!=null){const h=Math.floor(prefillMins/60),mm=prefillMins%60;defT=mm>0?`${h}:${String(mm).padStart(2,'0')}`:String(h);}else if(editObj){const h=Math.floor(editObj.minutes/60),mm=editObj.minutes%60;defT=mm>0?`${h}:${String(mm).padStart(2,'0')}`:String(h);}
  document.getElementById('modalArea').innerHTML=`

<div class="field"><label>업무 내용</label><textarea id="edesc" rows="3" placeholder="수행한 업무 내용">${editObj?.description||editObj?.desc||''}</textarea></div>

function saveMatter(eid){
  const code=(document.getElementById('mc')?.value||'').trim().toUpperCase();
  const name=(document.getElementById('mn')?.value||'').trim();
  if(!code)return alert('코드를 입력하세요');
  if(!name)return alert('Matter 명을 입력하세요');
  const mtype=document.getElementById('mtype')?.value||'time-b';
  const prev=eid?D.matters.find(x=>x.id===eid):{};
  const g=id=>document.getElementById(id);
  const m={
    id:eid||gid(),
    code,name,
    client:(g('mcl')?.value||'').trim(),
    type:mtype,
    status:g('mstatus')?.value||'active',
    // Fixed Fee
    retainer_amount:mtype==='fixed-f'?getRaw('mra')||null:null,
    retainer_cur:mtype==='fixed-f'?g('mrc')?.value||'KRW':
                 mtype==='litigation'?g('m_lit_cur')?.value||'KRW':
                 mtype==='retainer'?g('m_ret_cur')?.value||'KRW':'KRW',
    // Time Billing
    rate:mtype==='time-b'?getRaw('mr')||null:null,
    rate_cur:g('mrc2')?.value||'KRW',
    cap_amount:mtype==='time-b'?getRaw('mcap')||null:null,
    estimated_amount:mtype==='time-b'?getRaw('mest')||null:null,
    cap_cur:g('mcapcur')?.value||'KRW',
    // 연간 자문
    ret_total:mtype==='retainer'?getRaw('m_ret_total')||null:null,
    ret_cur:mtype==='retainer'?g('m_ret_cur')?.value||'KRW':null,
    monthly_hours:mtype==='retainer'?parseFloat(g('m_monthly_h')?.value)||null:null,
    overage_rate:mtype==='retainer'?getRaw('m_overage_r')||null:null,
    ret_start:mtype==='retainer'?g('m_ret_start')?.value||null:null,
    ret_end:mtype==='retainer'?g('m_ret_end')?.value||null:null,
    // 소송
    lit_retainer:mtype==='litigation'?getRaw('m_lit_retainer')||null:null,
    lit_balance:mtype==='litigation'?getRaw('m_lit_balance')||null:null,
    lit_mode:mtype==='litigation'?g('m_lit_mode')?.value||'fixed':null,
    // 성공보수 (소송/Time Billing/Fixed Fee 공통)
    contingency_amount:mtype==='litigation'?getRaw('m_contingency')||null:
                       (getRaw('m_contingency2')||null),
    contingency_condition:mtype==='litigation'?(g('m_contingency_cond')?.value||'').trim():
                          (g('m_contingency_cond2')?.value||'').trim()||null,
    // 업적 유형
    achievement_type:g('matype')?.value||'solo',
    collab_team:(g('mteam')?.value||'').trim(),
    my_ratio:parseFloat(g('mratio')?.value)||100,
    billed_amount:getRaw('mba')||null,
    billed_cur:g('mbc')?.value||'KRW',
    starred:prev?.starred||false
  };
  if(eid)D.matters=D.matters.map(x=>x.id===eid?{...x,...m}:x);
  else D.matters.push(m);
  cloudSave('matter',m);closeModal();if(!eid)curTab=1;renderAll();
}

function doExport(mode){

  if(mode==='secretary'){const hdr=['날짜','코드','Matter명','업무내용','소요(분)','소요(시간)'];const data=rows.map(e=>{const m=D.matters.find(x=>x.id===e.matterId)||{};return[e.date,m.code||'',m.name||'',e.description||e.description||e.desc||'',e.minutes,(e.minutes/60).toFixed(2)];});const tot=rows.reduce((a,e)=>a+e.minutes,0);data.push(['','','','합계',tot,(tot/60).toFixed(2)]);exportCSV([hdr,...data],`LegalTrack_비서용_${from||'all'}_${to||'all'}.csv`);return;}
  const hdr=['날짜','코드','Matter명','유형','상태','의뢰인','업무내용','소요(분)','소요(시간)','청구가능','수임금액(원래화폐)','수임통화','수임KRW(오늘환율)','수임액업적KRW','입금액업적KRW','업적유형','협력팀','내비율'];
  const data=rows.map(e=>{const m=D.matters.find(x=>x.id===e.matterId)||{};const mt=MTYPE[m.type||'time-b'];const mst=MSTATUS[m.status||'active'];const at=ATYPE[m.achievement_type||'solo'];const rb=getRetainerBase(m);return[e.date,m.code||'',m.name||'',mt.label,mst.label,m.client||'',e.description||e.description||e.desc||'',e.minutes,(e.minutes/60).toFixed(2),e.billable?'Y':'N',rb.amount||'',rb.currency||'KRW',toKRW(rb.amount||0,rb.currency)||'',retainerKRW(m)||'',paymentKRW(m)||'',at.label,m.collab_team||'',m.my_ratio||100];});
  exportCSV([hdr,...data],`LegalTrack_전체_${from||'all'}_${to||'all'}.csv`);}
function exportFailedCSV(){const failed=D.matters.filter(m=>m.status==='failed');if(!failed.length)return alert('실패 항목이 없습니다');const hdr=['코드','Matter명','의뢰인','유형','실패일','사유분류','상세사유','경쟁로펌','대응메모','수임금액(원래화폐)','수임통화','수임KRW'];const data=failed.map(m=>{const rb=getRetainerBase(m);return[m.code,m.name,m.client||'',MTYPE[m.type||'time-b'].label,m.failed_date||'',m.fail_category||'',m.fail_reason||'',m.fail_competitor||'',m.fail_memo||'',rb.amount||'',rb.currency||'KRW',toKRW(rb.amount||0,rb.currency)||''];});exportCSV([hdr,...data],`LegalTrack_수임실패분석_${today()}.csv`);}
function exportCSV(data,fname){const csv='\uFEFF'+data.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);closeModal();}

/* ── Backup ── */
function openBackupModal(){document.getElementById('modalArea').innerHTML=`
<div class="mbg" onclick="if(event.target===this)closeModal()">
<div class="msh" style="max-width:480px"><div class="mhdl"></div><div class="mttl">💾 백업 / 복원</div>
<div class="ibox">백업 파일을 내려받아 보관하고, 업로드하면 모든 데이터가 자동 복원됩니다.<br>프로그램 업데이트 시 이 방법으로 데이터를 이전할 수 있습니다.</div>
<div style="background:var(--bg);border-radius:9px;padding:9px 11px;margin-bottom:12px;font-size:12px;color:var(--text2)">📁 Matters: <b>${D.matters.length}건</b> &nbsp;|&nbsp; 🕐 기록: <b>${D.entries.length}건</b> &nbsp;|&nbsp; 💰 입금: <b>${(D.payments||[]).length}건</b></div>
<button class="savebtn teal" onclick="doBackupDownload()" style="margin-bottom:10px">⬇️ 전체 데이터 백업 다운로드</button>
<div class="divider"></div>
<div class="cttl" style="margin-bottom:7px">데이터 복원</div>
<div class="dropzone" id="dz" onclick="document.getElementById('backupFile').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">
  <span class="dropzone-ico">📂</span><div class="dropzone-txt">백업 JSON 파일을 드래그하거나 탭하여 선택</div>
</div>
<input type="file" id="backupFile" accept=".json" style="display:none" onchange="handleBackupFile(this)">
<div id="restoreStatus"></div>
<button class="cancelbtn" onclick="closeModal()">닫기</button>
</div></div>`;}
function doBackupDownload(){const backup={version:1,exportedAt:new Date().toISOString(),cfg:{usdKrw:CFG.usdKrw,cnyKrw:CFG.cnyKrw},data:D};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)],{type:'application/json'}));a.download=`LegalTrack_backup_${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function handleDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processBackupFile(f);}
function handleBackupFile(inp){if(inp.files[0])processBackupFile(inp.files[0]);}
function processBackupFile(file){const st=document.getElementById('restoreStatus');if(st)st.innerHTML='<div class="ibox">읽는 중...</div>';const reader=new FileReader();reader.onload=function(e){try{const backup=JSON.parse(e.target.result);let restored=backup.version===1&&backup.data?backup.data:(backup.matters||backup.entries?backup:null);if(!restored||!Array.isArray(restored.matters))throw new Error('올바른 백업 파일이 아닙니다');if(!confirm(`복원하시겠습니까?\nMatters: ${restored.matters.length}건 | 기록: ${(restored.entries||[]).length}건 | 입금: ${(restored.payments||[]).length}건\n⚠️ 현재 데이터가 교체됩니다.`))return;D={matters:restored.matters||[],entries:restored.entries||[],payments:restored.payments||[]};localSave();if(backup.cfg){if(backup.cfg.usdKrw)CFG.usdKrw=backup.cfg.usdKrw;if(backup.cfg.cnyKrw)CFG.cnyKrw=backup.cfg.cnyKrw;saveCFG();}if(st)st.innerHTML=`<div class="gbox">✅ 복원 완료! Matters ${D.matters.length}건, 기록 ${D.entries.length}건</div>`;setTimeout(()=>{closeModal();renderAll();},1500);}catch(err){if(st)st.innerHTML=`<div class="rbox">❌ 오류: ${err.message}</div>`;}};reader.readAsText(file);}

/* ── Settings ── */
function openSettings(){
  document.getElementById('modalArea').innerHTML='<div class="mbg" onclick="if(event.target===this)closeModal()"><div class="msh" style="max-width:440px"><div class="mhdl"></div><div class="mttl">&#9881;&#65039; 설정</div>'
    +'<div class="cttl" style="margin-bottom:7px">환율 (자동 조회)</div>'
    +'<div class="ibox" id="rateStatus">환율 조회 중...</div>'
    +'<div class="field-row"><div class="field"><label>USD &#8594; KRW</label><input id="cfgUsd" value="'+CFG.usdKrw+'" type="number" placeholder="1380"></div>'
    +'<div class="field"><label>CNY &#8594; KRW</label><input id="cfgCny" value="'+CFG.cnyKrw+'" type="number" placeholder="190"></div></div>'
    +'<div class="hint" style="margin-bottom:12px">수임액: 오늘 환율 | 입금: 입금일 환율 별도 적용</div>'
    +'<div class="cttl" style="margin-bottom:7px">인센티브 구간 설정</div>'
    +'<div class="ibox" style="margin-bottom:8px">입금액 기준 업적으로 인센티브를 계산합니다. 구간별 요율(%)을 입력하세요.</div>'
    +'<div id="tierInputs">'+renderTierInputs()+'</div>'
    +'<div style="display:flex;gap:7px;margin-bottom:12px"><button onclick="addTier()" style="flex:1;padding:7px;border:1.5px dashed var(--border);border-radius:9px;background:none;cursor:pointer;font-size:12px;color:var(--text3)">+ 구간 추가</button></div>'
    +'<div class="cttl" style="margin-bottom:7px">🐙 GitHub 동기화 (중국에서 사용 가능)</div>'
    +'<div class="ibox" style="background:var(--green-l);color:var(--green)">✅ 중국에서도 작동합니다! GitHub Token을 입력하면 모든 기기에서 동기화됩니다.</div>'
    +'<div class="field"><label>GitHub Token</label><input id="ghToken" value="'+(CFG.ghToken||'')+'" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"></div>'
    +'<div class="hint" style="margin-bottom:12px">github.com → Settings → Developer settings → Personal access tokens → Tokens (classic)</div>'
    +'<div class="cttl" style="margin-bottom:7px">Supabase 동기화 (한국/해외)</div>'
    +'<div class="ibox">연결하면 모든 기기에서 자동 동기화</div>'
    +'<div class="field"><label>Project URL</label><input id="sbUrl" value="'+(CFG.supaUrl||'')+'" placeholder="https://xxxx.supabase.co"></div>'
    +'<div class="field"><label>Anon Key</label><input id="sbKey" value="'+(CFG.supaKey||'')+'" placeholder="eyJhbGci..."></div>'
    +'<button class="savebtn" onclick="saveSettings()">저장</button>'
    +(CFG.supaUrl?'<button class="cancelbtn" style="color:var(--red)" onclick="if(confirm(&quot;연결 해제?&quot;)){CFG.supaUrl=&quot;&quot;;CFG.supaKey=&quot;&quot;;saveCFG();closeModal();renderAll();}">Supabase 연결 해제</button>':'')
    +'<button class="cancelbtn" onclick="closeModal()">취소</button>'
    +'</div></div>';
  fetchLiveRates().then(function(ok){
    var el=document.getElementById('rateStatus');if(!el)return;
    if(ok){el.textContent='✓ USD '+CFG.usdKrw+'원 · CNY '+CFG.cnyKrw+'원';el.style.background='var(--green-l)';el.style.color='var(--green)';}
    else{el.textContent='자동 조회 실패 — 직접 입력하세요';el.style.background='var(--orange-l)';el.style.color='var(--orange)';}
    var ue=document.getElementById('cfgUsd'),ce=document.getElementById('cfgCny');
    if(ue)ue.value=CFG.usdKrw;if(ce)ce.value=CFG.cnyKrw;
  });
}
function renderTierInputs(){
  return incentiveTiers.slice(1).map((tier,i)=>{
    var row='<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">';
    row+='<input type="number" value="'+((tier.threshold/100000000).toFixed(1))+'" min="0" step="0.5" onchange="updateTier('+i+',0,this.value)" style="flex:1;padding:8px 10px;font-size:13px;border:none;border-radius:9px;background:var(--white);font-family:inherit" placeholder="억원">';
    row+='<span style="font-size:11px;color:var(--text3);white-space:nowrap">억 이상</span>';
    row+='<input type="number" value="'+tier.rate+'" min="0" max="100" step="0.5" onchange="updateTier('+i+',1,this.value)" style="width:60px;padding:8px 10px;font-size:13px;border:none;border-radius:9px;background:var(--white);font-family:inherit" placeholder="%">';
    row+='<span style="font-size:11px;color:var(--text3)">%</span>';
    row+='<button onclick="removeTier('+i+')" style="background:none;border:none;cursor:pointer;font-size:14px;color:var(--red);padding:2px">✕</button>';
    row+='</div>';
    return row;
  }).join('');
}
function updateTier(i,field,val){
  var tier=incentiveTiers[i+1];if(!tier)return;
  if(field===0)tier.threshold=Math.round(parseFloat(val||0)*100000000);
  else tier.rate=parseFloat(val||0);
  tier.label=(tier.threshold/100000000)+'억 이상 '+tier.rate+'%';
}
function addTier(){incentiveTiers.push({threshold:0,rate:0,label:'새 구간'});const el=document.getElementById('tierInputs');if(el)el.innerHTML=renderTierInputs();}
function removeTier(i){incentiveTiers.splice(i+1,1);const el=document.getElementById('tierInputs');if(el)el.innerHTML=renderTierInputs();}
function saveSettings(){
  incentiveTiers.sort((a,b)=>a.threshold-b.threshold);
  CFG.usdKrw=parseFloat(document.getElementById('cfgUsd').value)||1380;
  CFG.cnyKrw=parseFloat(document.getElementById('cfgCny').value)||190;
  CFG.ghToken=(document.getElementById('ghToken')?.value||'').trim();
  CFG.supaUrl=(document.getElementById('sbUrl').value||'').trim().replace(/\/$/,'');
  CFG.supaKey=(document.getElementById('sbKey').value||'').trim();saveCFG();closeModal();
  if(CFG.ghToken){ghLoad().then(()=>renderAll());}
  else if(CFG.supaUrl){syncCloud().then(renderAll);}
  else{renderAll();}
}

window.addEventListener('resize',()=>renderAll());
init();
</script>
</body>
</html>
