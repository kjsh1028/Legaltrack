<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LegalTrack">
<title>LegalTrack v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#00875A;--g2:#006644;--gl:#E3FCEF;
  --b:#0052CC;--bl:#DEEBFF;
  --o:#FF8B00;--ol:#FFFAE6;
  --r:#DE350B;--rl:#FFEBE6;
  --t:#008DA6;--tl:#E6FCFF;
  --p:#5243AA;--pl:#EAE6FF;
  --gray:#6B778C;--grayl:#F4F5F7;
  --bg:#F5F5F7;--white:#fff;
  --text:#172B4D;--text2:#344563;--text3:#7A869A;
  --border:#DFE1E6;--shadow:0 1px 2px rgba(0,0,0,.06),0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  /* Legacy */
  --green:var(--g);--green-l:var(--gl);--blue:var(--b);--blue-l:var(--bl);
  --purple:var(--p);--purple-l:var(--pl);--orange:var(--o);--orange-l:var(--ol);
  --red:var(--r);--red-l:var(--rl);--gold:var(--o);--gold-l:var(--ol);
  --teal:var(--t);--teal-l:var(--tl);
}

/* ── Base ── */
html,body{height:100%;background:var(--bg);
  font-family:'Pretendard',-apple-system,'SF Pro Display',sans-serif;
  color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}

/* ── App shell ── */
.app{display:flex;flex-direction:column;height:100dvh;overflow:hidden}

/* ── Header ── */
.app-header{
  background:var(--g);
  padding:52px 20px 12px;
  flex-shrink:0;
}
@media(min-width:768px){.app-header{padding:14px 24px;display:flex;align-items:center;gap:12px}}
.hdr-top{display:flex;align-items:center;gap:10px}
.hdr-logo{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.4px}
.hdr-date{font-size:12px;color:rgba(255,255,255,.75);margin-left:auto;font-weight:500}
.hdr-gear{background:rgba(255,255,255,.2);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;margin-left:8px;flex-shrink:0}
.hdr-sync{font-size:11px;color:rgba(255,255,255,.8);display:flex;align-items:center;gap:4px;margin-top:6px}
@media(min-width:768px){.hdr-sync{margin-top:0;margin-left:auto}}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0}
.dot.ok{background:#36B37E}

/* ── Desktop nav ── */
.desk-nav{display:none;background:var(--white);border-right:1px solid var(--border);width:200px;flex-shrink:0;padding:10px 0}
@media(min-width:768px){.desk-nav{display:block}}
.dn-btn{width:100%;display:flex;align-items:center;gap:8px;padding:10px 16px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text2);text-align:left}
.dn-btn:hover{background:var(--bg)}.dn-btn.on{background:var(--gl);color:var(--g);font-weight:600}

/* ── App body ── */
.app-body{flex:1;display:flex;overflow:hidden}
.page-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.page-hdr{display:none;padding:14px 22px 0;flex-shrink:0}
@media(min-width:768px){.page-hdr{display:flex;align-items:center;justify-content:space-between}}
.page-title{font-size:18px;font-weight:800}
.page-actions{display:flex;gap:8px;align-items:center}
.back-btn{display:none;align-items:center;gap:4px;background:none;border:none;cursor:pointer;font-size:13px;color:var(--b);font-family:inherit;padding:4px 0}

/* ── Mobile sub-header ── */
#mobSubHdr{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;flex-shrink:0;align-items:center;gap:10px}
@media(min-width:768px){#mobSubHdr{display:none!important}}

/* ── Timer ── */
.tbanner{background:var(--gl);border-bottom:1px solid #B3F5CF;padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--g);animation:pulse 1.5s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.tlbl{font-size:12px;color:var(--g2);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ttime{font-family:monospace;font-size:13px;font-weight:700;color:var(--g2)}
.tstop{background:var(--g);color:#fff;border:none;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.syncbar{background:var(--bl);border-bottom:1px solid #B3D4FF;padding:5px 16px;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--b);flex-shrink:0}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
.sdot.ok{background:var(--g)}.sdot.err{background:var(--r)}

/* ── Content ── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ── Bottom nav ── */
.tabbar{
  background:#fff;
  border-top:2.5px solid var(--g);
  display:flex;padding-bottom:max(env(safe-area-inset-bottom),6px);
  flex-shrink:0;position:relative;z-index:50;
  box-shadow:0 -1px 0 rgba(0,0,0,.04);
}
@media(min-width:768px){.tabbar{display:none}}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 0 0;cursor:pointer;border:none;background:none;gap:3px;font-family:inherit;position:relative;z-index:51}
.tb-i{font-size:22px;line-height:1;transition:transform .15s}
.tb-l{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:.01em;transition:color .15s}
.tb.on .tb-l{color:var(--g);font-weight:700}
.tb.on .tb-i{transform:scale(1.15)}
.tb.on::before{content:'';position:absolute;top:-2.5px;left:20%;right:20%;height:2.5px;background:var(--g);border-radius:0 0 3px 3px}
.fab-wrap{flex:0 0 72px;display:flex;flex-direction:column;align-items:center;padding:0;cursor:pointer;background:none;font-family:inherit;position:relative;z-index:10}
.fab{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(145deg,#00A868,var(--g));
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:26px;
  margin-top:-14px;
  box-shadow:0 4px 20px rgba(0,135,90,.4),0 1px 4px rgba(0,0,0,.1);
  border:none;cursor:pointer;font-family:inherit;
  transition:transform .15s;
}
.fab:active{transform:scale(.92)}
.fab-l{font-size:10px;color:var(--text3);margin-top:3px;font-weight:500}

/* ═══════════════════════════════
   DASHBOARD - Premium design
═══════════════════════════════ */
.dash-wrap{
  background:var(--bg);
  height:100%;display:flex;flex-direction:column;overflow:hidden;
}
.dash-header{
  padding:18px 18px 10px;
  flex-shrink:0;
}
.dash-header-title{
  font-size:22px;font-weight:800;color:var(--text);
  letter-spacing:-.5px;margin-bottom:2px;
}
.dash-header-sub{font-size:13px;color:var(--text3);font-weight:400}
.dash-kpi{
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:0 14px 14px;
}
@media(min-width:500px){.dash-kpi{grid-template-columns:repeat(4,1fr)}}

/* KPI Card - clean white card, minimal */
.kpi-item{
  background:var(--white);
  border-radius:16px;
  padding:13px 14px 13px;
  display:flex;flex-direction:column;
  justify-content:space-between;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
  overflow:hidden;position:relative;
  transition:transform .12s,box-shadow .12s;
  height:110px;box-sizing:border-box;
}
.kpi-item.kpi-tap{cursor:pointer}
.kpi-item.kpi-tap:active{transform:scale(.96);box-shadow:none}
/* Accent strip at top */
.kpi-item::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--accent,var(--border));
  border-radius:16px 16px 0 0;
}
.kpi-o::before{--accent:#F59E0B}
.kpi-g::before{--accent:#10B981}
.kpi-gold::before{--accent:#F59E0B}
.kpi-teal::before{--accent:#06B6D4}
.kpi-r::before{--accent:#EF4444}
.kpi-b::before,.kpi-blue::before{--accent:#3B82F6}
.kpi-p::before{--accent:#8B5CF6}

.kpi-lbl{
  font-size:14px;font-weight:700;
  color:var(--text2);
  letter-spacing:.01em;line-height:1.2;
  margin-bottom:0;margin-top:0;
}
.kpi-num{
  font-size:clamp(22px,5.5vw,30px);
  font-weight:800;
  letter-spacing:-.03em;
  line-height:1;
  color:var(--text);
}
/* color accent on number */
.kpi-o .kpi-lbl,.kpi-o .kpi-num{color:#D97706}
.kpi-g .kpi-lbl,.kpi-g .kpi-num{color:#059669}
.kpi-gold .kpi-lbl,.kpi-gold .kpi-num{color:#D97706}
.kpi-teal .kpi-lbl,.kpi-teal .kpi-num{color:#0891B2}
.kpi-r .kpi-lbl,.kpi-r .kpi-num{color:#DC2626}
.kpi-b .kpi-lbl,.kpi-b .kpi-num,.kpi-blue .kpi-num{color:#2563EB}
.kpi-p .kpi-lbl,.kpi-p .kpi-num{color:#7C3AED}
@media(min-width:500px){.kpi-num{font-size:28px}}

/* Legacy compat */
.kpi-val{font-size:24px;font-weight:800;line-height:1}
.kpi-unit{font-size:14px;font-weight:600;margin-left:1px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:4px}

/* ═══════════════════════════
   LIST VIEW
═══════════════════════════ */
.list-wrap{padding:10px 14px 90px}
@media(min-width:768px){.list-wrap{padding:14px 24px 50px}}
.group-hdr{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;padding:12px 0 6px}
.list-item{
  display:flex;align-items:center;
  background:var(--white);border-radius:12px;
  margin-bottom:7px;padding:13px 14px;
  box-shadow:var(--shadow);border:1px solid var(--border);
  cursor:pointer;gap:12px;
  transition:transform .1s;
}
.list-item:active{transform:scale(.98)}
.li-body{flex:1;min-width:0}
.li-name{font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px;letter-spacing:-.2px}
.li-meta{font-size:12px;color:var(--text3)}
.li-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.li-amt{font-size:14px;font-weight:700;color:var(--g2)}
.li-arr{font-size:18px;color:var(--border)}
.fab-btn{width:100%;margin-top:12px;padding:14px;border:none;border-radius:12px;background:var(--g);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:-.2px}
.empty-state{padding:48px 0;text-align:center;color:var(--text3);font-size:14px;line-height:2}

/* ═══════════════════════════
   DETAIL VIEW
═══════════════════════════ */
.detail-wrap{padding:12px 14px 90px}
@media(min-width:768px){.detail-wrap{padding:18px 24px 50px}}
.detail-header{background:var(--white);border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.detail-name{font-size:18px;font-weight:800;margin-bottom:8px;line-height:1.3;letter-spacing:-.3px}
.detail-meta{display:flex;gap:5px;flex-wrap:wrap}
.dtag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.02em}
.dtag.g{background:var(--gl);color:var(--g2)}.dtag.p{background:var(--pl);color:var(--p)}
.dtag.b{background:var(--bl);color:var(--b)}.dtag.r{background:var(--rl);color:var(--r)}
.dtag.o{background:var(--ol);color:var(--o)}.dtag.gray{background:var(--grayl);color:var(--gray)}
.info-section{background:var(--white);border-radius:12px;padding:2px 14px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.info-row{display:flex;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--border);gap:12px}
.info-row:last-child{border-bottom:none}
.info-lbl{font-size:12px;color:var(--text3);width:80px;flex-shrink:0;padding-top:1px;font-weight:500}
.info-val{font-size:14px;color:var(--text);flex:1;line-height:1.5;font-weight:500}
.section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px}
.entry-list{background:var(--white);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:10px}
.entry-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.entry-row:last-child{border-bottom:none}
.entry-row:active{background:var(--bg)}
.er-date{font-size:11px;color:var(--text3);flex-shrink:0;width:68px;font-weight:500}
.er-desc{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.er-time{font-size:13px;font-weight:700;flex-shrink:0;color:var(--g2)}
.action-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.act-btn{flex:1;min-width:80px;padding:12px 10px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;background:var(--grayl);color:var(--text2);letter-spacing:-.1px}
.act-btn:active{opacity:.75}
.act-btn.act-primary{background:var(--g);color:#fff}
.act-btn.act-teal{background:var(--t);color:#fff}
.act-btn.act-red{background:var(--r);color:#fff}

/* ═══════════════════════════
   QUERY PAGE
═══════════════════════════ */
.query-selector{padding:16px 14px}
.qs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
@media(min-width:500px){.qs-grid{grid-template-columns:repeat(4,1fr)}}
.qs-btn{
  background:var(--white);border:1px solid var(--border);
  border-radius:14px;padding:18px 10px 16px;
  cursor:pointer;font-family:inherit;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:var(--shadow);transition:all .12s;
}
.qs-btn:active{transform:scale(.95);box-shadow:none}
.qs-ico{font-size:26px;line-height:1}
.qs-lbl{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.query-results{padding:10px 14px 90px}
@media(min-width:768px){.query-results{padding:14px 24px 50px}}
.preset-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.preset-tabs::-webkit-scrollbar{display:none}
.ptab{
  padding:8px 16px;border:1px solid var(--border);border-radius:20px;
  background:var(--white);font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;color:var(--text3);
  white-space:nowrap;flex-shrink:0;
  transition:all .12s;
}
.ptab.on{border-color:var(--g);background:var(--gl);color:var(--g2);font-weight:700}
.ptab:active{opacity:.7}
.date-row{display:flex;align-items:center;margin-bottom:10px;gap:6px}

/* Custom date */
.custom-date-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.cdr-fields{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.cdr-input{flex:1;padding:10px 12px;font-size:15px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);font-family:inherit;color:var(--text);-webkit-appearance:none;min-width:0}
.cdr-input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(0,135,90,.12)}
.cdr-sep{font-size:13px;color:var(--text3);flex-shrink:0}
.cdr-btn{padding:10px 18px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0}
.cdr-btn:active{opacity:.85}
.matter-sel{width:100%;padding:10px 12px;font-size:14px;border:1px solid var(--border);border-radius:10px;background:var(--white);font-family:inherit;margin-bottom:10px;-webkit-appearance:none;color:var(--text);font-weight:500}
.tq-stats{display:flex;gap:8px;margin-bottom:12px}
.tqs{flex:1;border-radius:12px;padding:12px;border:1px solid var(--border)}
.tqs-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tqs-v{font-size:20px;font-weight:800;line-height:1;letter-spacing:-.03em}
.tqs.g{background:var(--gl);color:var(--g2);border-color:#B3F5CF}
.tqs.b{background:var(--bl);color:var(--b);border-color:#B3D4FF}
.tqs.gray{background:var(--grayl);color:var(--gray);border-color:var(--border)}
.export-btn{background:var(--grayl);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;color:var(--text2);font-weight:600;cursor:pointer;font-family:inherit}
.qr-list{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.qr-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.qr-item:last-child{border-bottom:none}
.qr-item:active{background:var(--bg)}
.qri-date{font-size:11px;color:var(--text3);flex-shrink:0;width:68px;font-weight:500}
.qri-name{font-size:14px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:-.1px}
.qri-time{font-size:14px;font-weight:700;flex-shrink:0;color:var(--g2)}
.qri-arr{font-size:14px;color:var(--border);flex-shrink:0}

/* ═══════════════════════════
   MODAL
═══════════════════════════ */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:768px){.mbg{align-items:center}}
.msh{background:var(--bg);border-radius:24px 24px 0 0;padding:12px 16px;width:100%;max-width:600px;max-height:94vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),24px)}
@media(min-width:768px){.msh{border-radius:16px;max-height:90vh;padding:22px 24px 24px}}
.mhdl{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
@media(min-width:768px){.mhdl{display:none}}
.mttl{font-size:17px;font-weight:800;margin-bottom:14px;letter-spacing:-.3px}
.field{margin-bottom:11px}
.field label{font-size:11px;color:var(--text3);font-weight:700;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;font-size:15px;border:1px solid var(--border);border-radius:10px;background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 3px rgba(0,135,90,.12)}
.field textarea{resize:none;line-height:1.5}
.field-row{display:flex;gap:8px}.field-row .field{flex:1}
.field .cs{flex:0 0 88px!important}
.hint{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5}
.conv{font-size:12px;color:var(--g);font-weight:700;margin-top:3px}
.crow{display:flex;align-items:center;gap:10px;padding:2px 0 11px}
.crow input[type=checkbox]{width:18px;height:18px;accent-color:var(--g);cursor:pointer;flex-shrink:0}
.crow label{font-size:14px;cursor:pointer;font-weight:500}
.cur-row{display:flex;gap:6px;align-items:flex-end}.cur-row .field{flex:1}.cur-row .field.cs{flex:0 0 88px}
.divider{height:1px;background:var(--border);margin:14px 0}
.savebtn{width:100%;padding:14px;border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--g);margin-top:4px;letter-spacing:-.1px}
.savebtn:active{opacity:.85}
.savebtn.red{background:var(--r)}.savebtn.o,.savebtn.gold{background:var(--o)}.savebtn.teal{background:var(--t)}
.cancelbtn{width:100%;padding:11px;background:none;border:none;font-size:14px;color:var(--text3);cursor:pointer;font-family:inherit;text-align:center;margin-top:2px}

  // litigation: base = 착수금 + 잔금 (성공보수 제외)
  if(m.type==='litigation'){
    const base=(parseFloat(m.lit_retainer||0)+parseFloat(m.lit_balance||0));
    return{amount:base||0,currency:m.retainer_cur||'KRW'};
  }
  return{amount:m.retainer_amount||0,currency:m.retainer_cur||'KRW'};
}
// 성공보수 예정액 (업적에서 제외, 별도 표시)
function getContingency(m){
  if(!m.contingency_amount)return null;
  return{amount:parseFloat(m.contingency_amount||0),currency:m.retainer_cur||'KRW',condition:m.contingency_condition||''};
}
// 전체 성공보수 합계 (모든 Matter)
function totalContingencyKRW(){
  return D.matters.filter(m=>m.contingency_amount&&!['failed','internal'].includes(m.status))
    .reduce((a,m)=>a+toKRW(m.contingency_amount,m.retainer_cur),0);
}
function retainerKRW(m){if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;const b=getRetainerBase(m);return applyRatio(toKRW(b.amount,b.currency),m);}
function paymentKRW(m){if(['biz-b','office-i'].includes(m.type||'')||m.status==='failed')return 0;const paid=(D.payments||[]).filter(p=>p.matterId===m.id).reduce((s,p)=>s+(p.krw_amount||0),0);return applyRatio(paid,m);}
function applyRatio(base,m){const ratio=(parseFloat(m.my_ratio)||100)/100;const at=m.achievement_type||'solo';if(['solo','china-collab','kjm-jya'].includes(at))return Math.round(base);if(['korea-collab','team-originate'].includes(at))return Math.round(base*ratio);if(at==='team-referral')return toKRW(m.billed_amount||0,m.billed_cur||'KRW');return 0;}
function rawRetainerKRW(m){const b=getRetainerBase(m);return toKRW(b.amount,b.currency);}
function payProgress(m){const cap=rawRetainerKRW(m);if(!cap)return null;const paid=(D.payments||[]).filter(p=>p.matterId===m.id).reduce((s,p)=>s+(p.krw_amount||0),0);return{paid,cap,pct:Math.min(100,Math.round(paid/cap*100))};}

function showSync(s,msg){const sd=document.getElementById('sbDot'),st=document.getElementById('sbSyncTxt');if(sd)sd.className='sdot'+(s==='ok'?' ok':s==='err'?' err':s==='sy'?' sy':'');if(st&&s!=='none')st.textContent=msg||(CFG.ghToken?'GitHub 모드':(CFG.supaUrl?'Supabase 모드':'로컬 모드'));const bar=document.getElementById('syncBar'),dot=document.getElementById('syncDot'),txt=document.getElementById('syncTxt');if(!bar)return;if(s==='none'){bar.style.display='none';return;}bar.style.display='flex';if(dot)dot.className='sdot'+(s==='ok'?' ok':s==='err'?' err':'');if(txt)txt.textContent=msg||'';if(s==='ok')setTimeout(()=>showSync('none'),3000);if(s==='err')setTimeout(()=>showSync('none'),8000);}

/* ── GitHub Sync ── */
async function ghFetch(path, opts={}){
  if(!CFG.ghToken)return null;
  const res=await fetch('https://api.github.com/repos/'+CFG.ghRepo+path,{
    ...opts,
    headers:{'Authorization':'token '+CFG.ghToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json',...(opts.headers||{})}
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return res.json();
}
async function ghLoad(){
  if(!CFG.ghToken)return false;
  showSync('sy','GitHub 불러오는 중...');
  try{
    const r=await ghFetch('/contents/legaltrack-data.json');
    const raw=atob(r.content.split('\n').join(''));
    const bytes=new Uint8Array(raw.length).map((_,i)=>raw.charCodeAt(i));
    const decoded=JSON.parse(new TextDecoder().decode(bytes));
    // Compare local vs GitHub - use whichever has more data
    const localMatters=D.matters||[];
    const localEntries=D.entries||[];
    const ghMatters=decoded.matters||[];
    const ghEntries=decoded.entries||[];
    
    // Merge: combine both, deduplicate by id, keep GitHub version if conflict
    const mergeById=(local, remote)=>{
      const map={};
      local.forEach(x=>{if(x.id)map[x.id]=x;});
      remote.forEach(x=>{if(x.id)map[x.id]=x;}); // GitHub wins on conflict
      return Object.values(map);
    };
    
    D.matters=mergeById(localMatters, ghMatters);
    D.entries=mergeById(localEntries, ghEntries);
    D.payments=mergeById(D.payments||[], decoded.payments||[]);
    D.clients=mergeById(D.clients||[], decoded.clients||[]);
    D.contacts=mergeById(D.contacts||[], decoded.contacts||[]);
    D.todos=mergeById(D.todos||[], decoded.todos||[]);
    D._ghSha=r.sha;
    localSave();
    
    // If local had more data, re-save to GitHub
    if(localMatters.length>ghMatters.length||localEntries.length>ghEntries.length){
      console.log('Local has newer data, syncing to GitHub...');
      setTimeout(()=>ghSave(),1000);
    }
    
    showSync('ok','✓ GitHub 동기화 완료');
    return true;
  }catch(e){
    if(e.message.includes('404')){
      // File doesn't exist yet - that's OK
      showSync('ok','✓ GitHub 연결됨 (새 저장소)');
      return true;
    }
    console.error('ghLoad error:',e.message);
    showSync('err','GitHub 연결 실패');
    return false;
  }
}
async function ghSave(){
  if(!CFG.ghToken)return;
  showSync('sy','GitHub 저장 중...');
  try{
    // Always use current D state at time of save
    const saveData={matters:[...D.matters],entries:[...D.entries],payments:[...D.payments],clients:[...(D.clients||[])],contacts:[...(D.contacts||[])],todos:[...(D.todos||[])]};
    const jsonStr=JSON.stringify(saveData,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    const binStr=Array.from(bytes).map(b=>String.fromCharCode(b)).join('');
    const content_b64=btoa(binStr);
    const body={message:'LegalTrack data update '+new Date().toISOString(),content:content_b64,branch:CFG.ghBranch};
    if(D._ghSha)body.sha=D._ghSha;
    const r=await ghFetch('/contents/legaltrack-data.json',{method:'PUT',body:JSON.stringify(body)});
    D._ghSha=r.content.sha;
    showSync('ok','✓ 저장 완료');
  }catch(e){
    console.error('ghSave error:',e.message);
    showSync('err','GitHub 저장 실패: '+e.message.slice(0,40));
  }
}

    curLayer==='active_list'?'수임 완료':
    curLayer==='matter_detail'?'Matter 상세':
    curLayer==='entry_detail'?'기록 상세':
    curLayer==='client_detail'?'고객사 상세':
    curLayer==='contact_detail'?'명함 상세':

  if(curLayer==='client_detail'||curLayer==='contact_detail'){
    c.innerHTML=renderClientsPage();
  } else if(curLayer==='matter_detail'&&curTab!==0&&curTab!==2){
    c.innerHTML=renderMatterDetailLayer();

  else c.innerHTML=renderDash();
  // Add swipe-back on content
  setupSwipeBack(c);
}

let _swipeStartX=0;
function setupSwipeBack(el){
  if(!el)return;
  el.addEventListener('touchstart',e=>{_swipeStartX=e.touches[0].clientX;},{passive:true,once:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-_swipeStartX;
    if(dx>80&&(curLayer||_queryMode)){handleBack();}
  },{passive:true,once:true});
}

        :(m.client||'');
    })()):''}
    ${rb.amount?irow('수임액',`<b style="color:${mt.color}">${fmtM(rb.amount,rb.currency)}</b>${rb.currency!=='KRW'?' ≈'+fmtK(retK):''}`):''}
    ${m.type==='litigation'?`
      ${m.lit_retainer?irow('착수금',fmtM(m.lit_retainer,m.retainer_cur||'KRW')):''}

        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600">${o.name}</div>

  <!-- Action buttons -->

    <button class="act-btn act-primary" onclick="closeModal();openEntryModal('${m.id}')">＋ 시간기록</button>

    <button class="act-btn" onclick="toggleStar('${m.id}',event)">${m.starred?'★ 해제':'☆ 중요'}</button>
  </div>
  ${m.status==='prospect'?`<div class="action-row" style="margin-top:6px">
    <button class="act-btn act-primary" onclick="convertToActive('${m.id}')">✓ 수임완료</button>
    <button class="act-btn act-red" onclick="curLayer=null;openFailModal('${m.id}')">✗ 실패</button>
  </div>`:''}
  ${m.status==='active'?`<div class="action-row" style="margin-top:6px">
    <button class="act-btn act-teal" onclick="closeDeal('${m.id}')">🔒 클로징</button>
  </div>`:''}

function showMoneyQuery(type){_queryMode='money';_moneyType=type;goTab(2);}

  if(_queryMode==='clients') return renderClientsPage();
  if(_queryMode==='contacts'){_clientTab='contacts';_queryMode='clients';return renderClientsPage();}
  const items=[
    {ico:'⏱',l:'시간 조회',m:'time',extra:'month'},
    {ico:'📁',l:'사건 조회',m:'matters',extra:''},
    {ico:'🏆',l:'수임액',m:'money',extra:'retainer'},
    {ico:'💰',l:'입금액',m:'money',extra:'payment'},
    {ico:'🎯',l:'성공보수',m:'money',extra:'contingency'},
    {ico:'🏢',l:'고객사',m:'clients',extra:''},
    {ico:'👤',l:'명함',m:'contacts',extra:''},

  const qsBtns=items.map(k=>{

    <option value="all">전체 상태</option>
    ${[['prospect','수임 진행중'],['active','수임 완료'],['closed','클로징'],['internal','비빌링']].map(([v,l])=>`<option value="${v}"${statusF===v?' selected':''}>${l}</option>`).join('')}
  </select>`;
  const typeSel=`<select data-mqtype="1" style="flex:1;padding:9px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:#fff;font-family:inherit;-webkit-appearance:none">
    <option value="all">전체 유형</option>

  </select>`;

    const mt=MTYPE[m.type||'time-b'];

      <div style="flex:1;min-width:0">
        <div class="qri-name">${m.name}</div>
        <div style="font-size:11px;color:var(--text3)">${mst.label}${m.client?' · '+m.client:''}</div>
      </div>
      ${rb.amount?`<span class="qri-time" style="color:${mt.color}">${fmtM(rb.amount,rb.currency)}</span>`:''}
      <span class="qri-arr">›</span>
    </div>`;}).join('');
  return`<div class="query-results">
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <input id="mq_q" placeholder="이름·의뢰인·코드 검색..." value="${q}"
      oninput="_mqSearch=this.value;renderContent()"
      style="flex:1;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;background:#fff">
    <button onclick="openMatterModal()" style="padding:9px 14px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">＋</button>
  </div>
  <div style="display:flex;gap:6px;margin-bottom:10px">${statusSel}${typeSel}</div>
  <div style="font-size:12px;color:var(--text3);margin-bottom:8px">${items.length}건</div>
  <div class="qr-list">${items.length===0?'<div class="empty-state">항목 없음</div>':rows}</div>

function setTimePreset(k){_timePresetQ=k;_queryMode='time';renderContent();}
function applyCustomTime(){
  const f=document.getElementById('tqFrom');
  const t=document.getElementById('tqTo');
  if(f)_timeFrom=f.value;
  if(t)_timeTo=t.value;
  _queryMode='time';
  renderContent();
}

function renderTimeResults(){
  if(curLayer==='entry_detail') return renderEntryDetailLayer();
  const now=new Date();
  let from='',to='';
  if(_timePresetQ==='today'){from=to=today();}
  else if(_timePresetQ==='week'){
    const ws=new Date(now);
    ws.setDate(now.getDate()-now.getDay()+1);
    from=ws.toISOString().slice(0,10);to=today();
  }
  else if(_timePresetQ==='month'){
    from=now.getFullYear()+'-'+(String(now.getMonth()+1).padStart(2,'0'))+'-01';
    to=today();
  }
  else if(_timePresetQ==='custom'){from=_timeFrom||'';to=_timeTo||'';}

  const selMatter=(typeof _tqMatter!=='undefined'?_tqMatter:'all');
  let rows=[...D.entries];
  if(selMatter!=='all')rows=rows.filter(e=>e.matterId===selMatter);
  if(from)rows=rows.filter(e=>e.date>=from);
  if(to)rows=rows.filter(e=>e.date<=to);
  rows.sort((a,b)=>b.date.localeCompare(a.date));
  const total=rows.reduce((a,e)=>a+e.minutes,0);
  const billM=rows.filter(e=>e.billable).reduce((a,e)=>a+e.minutes,0);

  const presets=[['today','오늘'],['week','이번주'],['month','이번달'],['custom','직접입력']];

  const presetBtns=presets.map(([k,l])=>`<button class="ptab${_timePresetQ===k?' on':''}" onclick="setTimePreset('${k}')">${l}</button>`).join('');

  const matterOpts=D.matters.map(m=>`<option value="${m.id}"${selMatter===m.id?' selected':''}>${m.name}</option>`).join('');

  const rowsHTML=rows.length===0
    ?'<div class="empty-state">기록 없음</div>'
    :rows.map(e=>{
      const m=D.matters.find(x=>x.id===e.matterId)||{name:'?',type:'time-b'};
      const mt=MTYPE[m.type||'time-b'];
      return `<div class="qr-item" onclick="_selectedEntryId='${e.id}';curLayer='entry_detail';renderContent()">
        <span class="qri-date">${fmtDF(e.date)}</span>
        <span class="qri-name">${m.name}</span>
        <span class="qri-time" style="color:${mt.color}">${hhmm(e.minutes)}</span>
        <span class="qri-arr">›</span>
      </div>`;
    }).join('');

  return`<div class="query-results">
  <div class="preset-tabs">${presetBtns}</div>
  ${_timePresetQ==='custom'?`
  <div class="custom-date-row">
    <div class="cdr-fields">
      <input type="date" id="tqFrom" value="${_timeFrom||''}" placeholder="시작일" class="cdr-input">
      <span class="cdr-sep">~</span>
      <input type="date" id="tqTo" value="${_timeTo||''}" placeholder="종료일" class="cdr-input">
    </div>
    <button class="cdr-btn" data-applytime="1">조회</button>
  </div>`:''}
  <select class="matter-sel" id="tqMatterSel" data-tqmatter="1">
    <option value="all">전체 Matter</option>
    ${matterOpts}
  </select>
  <div class="tq-stats">
    <div class="tqs g"><div class="tqs-l">총 시간</div><div class="tqs-v">${hhmm(total)}</div></div>
    <div class="tqs b"><div class="tqs-l">청구 가능</div><div class="tqs-v">${hhmm(billM)}</div></div>
    <div class="tqs gray"><div class="tqs-l">기록 수</div><div class="tqs-v">${rows.length}건</div></div>
  </div>
  <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
    <button onclick="exportTimeXLSX('${from}','${to}')" class="export-btn">📊 Excel 저장</button>
  </div>
  <div class="qr-list">${rowsHTML}</div>
</div>`;}

function renderEntryDetailLayer(){
  const e=D.entries.find(x=>x.id===_selectedEntryId);
  if(!e)return`<div class="empty-state">기록을 찾을 수 없습니다</div>`;
  const m=D.matters.find(x=>x.id===e.matterId)||{name:'?',type:'time-b'};
  const mt=MTYPE[m.type||'time-b'];
  return`<div class="detail-wrap">
  <div class="detail-header">
    <div class="detail-name">${m.name}</div>

  </div>

    ${e.description||e.desc?irow('업무내용',e.description||e.desc):''}
  </div>

    <button class="act-btn act-primary" onclick="editEntry('${e.id}')">✏️ 수정</button>

function exportTimeQ(from,to){
  let rows=[...D.entries];
  if(from)rows=rows.filter(e=>e.date>=from);
  if(to)rows=rows.filter(e=>e.date<=to);
  rows.sort((a,b)=>a.date.localeCompare(b.date));
  const hdr=['날짜','Matter코드','Matter명','의뢰인','업무내용','소요(분)','소요(h)','청구가능'];
  const data=rows.map(e=>{const m=D.matters.find(x=>x.id===e.matterId)||{};return[e.date,m.code||'',m.name||'',m.client||'',e.description||e.desc||'',e.minutes,(e.minutes/60).toFixed(2),e.billable?'Y':'N'];});
  data.push(['합계','','','','',rows.reduce((a,e)=>a+e.minutes,0),(rows.reduce((a,e)=>a+e.minutes,0)/60).toFixed(2),'']);
  exportCSV([hdr,...data],'LegalTrack_시간_'+today()+'.csv');
}

/* ── 금액 조회 결과 ── */
function renderMoneyResults(){
  if(curLayer==='matter_detail') return renderMatterDetailLayer();
  const tabs=[['retainer','🏆 수임액'],['payment','💰 입금액'],['contingency','🎯 성공보수']];
  const moneyTabBtns=tabs.map(([k,l])=>`<button class="ptab${_moneyType===k?' on':''}" onclick="_moneyType='${k}';renderContent()">${l}</button>`).join('');
  const moneyQ=(document.getElementById('money_q')?.value||'').toLowerCase();
  let items=[], total=0, totalLabel='';

  if(_moneyType==='retainer'){
    items=D.matters.filter(m=>['active','closed','prospect'].includes(m.status)&&retainerKRW(m)>0);
    if(moneyQ)items=items.filter(m=>m.name.toLowerCase().includes(moneyQ)||(m.client||'').toLowerCase().includes(moneyQ));
    total=items.reduce((a,m)=>a+retainerKRW(m),0);totalLabel='수임액 합계';
  }else if(_moneyType==='payment'){
    items=D.matters.filter(m=>paymentKRW(m)>0);
    total=items.reduce((a,m)=>a+paymentKRW(m),0);totalLabel='입금액 합계';
  }else{
    items=D.matters.filter(m=>m.contingency_amount&&parseFloat(m.contingency_amount)>0&&!['failed','internal'].includes(m.status));
    total=items.reduce((a,m)=>a+toKRW(parseFloat(m.contingency_amount||0),m.retainer_cur||'KRW'),0);totalLabel='성공보수 예정 합계';
  }

  return`<div class="query-results">
  <div class="preset-tabs">${moneyTabBtns}</div>
  <!-- Total -->
  <div class="qr-total">
    <span class="qrt-label">${totalLabel}</span>
    <span class="qrt-value qrt-gold">${fmtK(total)}</span>
    <span class="qrt-count">${items.length}건</span>
    <button class="qr-export" onclick="exportMoneyQ()">📥 내보내기</button>
  </div>
  <!-- Search -->
  <input id="money_q" placeholder="이름·의뢰인 검색..." value=""
    oninput="renderContent()"
    style="width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:10px;font-family:inherit;background:#fff;margin-bottom:8px;-webkit-appearance:none">
  <!-- Results -->
  <div class="qr-list">
    ${items.length===0?`<div class="empty-state">항목 없음</div>`:
    items.map(m=>{
      const mt=MTYPE[m.type||'time-b'];const mst=MSTATUS[m.status||'active'];
      let amtDisplay='';
      if(_moneyType==='retainer'){const rb=getRetainerBase(m);amtDisplay=rb.amount?fmtM(rb.amount,rb.currency):'—';}
      else if(_moneyType==='payment'){const pays=(D.payments||[]).filter(p=>p.matterId===m.id);const byCur={};pays.forEach(p=>{byCur[p.currency||'KRW']=(byCur[p.currency||'KRW']||0)+parseFloat(p.amount||0);});amtDisplay=Object.entries(byCur).map(([c,a])=>fmtM(a,c)).join('+');}
      else{amtDisplay=fmtM(m.contingency_amount,m.retainer_cur||'KRW');}
      return`<div class="qr-item" onclick="_selectedMatterId='${m.id}';_prevLayer=curLayer;curLayer='matter_detail';renderContent()">
        <span class="qri-name">${m.name}</span>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
          <span class="qri-time" style="color:${mt.color}">${amtDisplay}</span>
          <span style="font-size:10px;color:var(--text3)">${mst.label}</span>
        </div>
        <span class="qri-arr">›</span>
      </div>`;}).join('')}
  </div>
</div>`;}

function exportMoneyQ(){
  const type=_moneyType;
  let matters=[];
  if(type==='retainer')matters=D.matters.filter(m=>['active','closed','prospect'].includes(m.status)&&retainerKRW(m)>0);
  else if(type==='payment')matters=D.matters.filter(m=>paymentKRW(m)>0);
  else matters=D.matters.filter(m=>m.contingency_amount&&parseFloat(m.contingency_amount)>0&&!['failed','internal'].includes(m.status));
  const hdr=['코드','Matter명','유형','상태','의뢰인','금액(원래화폐)','통화','KRW','성공보수조건'];
  const data=matters.map(m=>{
    const rb=getRetainerBase(m);const mt=MTYPE[m.type||'time-b'];const mst=MSTATUS[m.status||'active'];
    let amt='',cur='KRW',krw=0;
    if(type==='retainer'){amt=rb.amount||'';cur=rb.currency||'KRW';krw=retainerKRW(m);}
    else if(type==='payment'){const pays=(D.payments||[]).filter(p=>p.matterId===m.id);krw=paymentKRW(m);amt=pays.map(p=>fmtM(p.amount,p.currency)).join('+');}
    else{amt=m.contingency_amount||'';cur=m.retainer_cur||'KRW';krw=toKRW(parseFloat(m.contingency_amount||0),m.retainer_cur||'KRW');}
    return[m.code||'',m.name,mt.label,mst.label,m.client||'',amt,cur,krw,m.contingency_condition||''];
  });
  exportCSV([hdr,...data],'LegalTrack_금액조회_'+today()+'.csv');
}

function renderTodos(){
  if(!D.todos)D.todos=[];
  const filter=typeof _todoFilter!=='undefined'?_todoFilter:'all'; // all|yulchon|personal
  const showDone=typeof _todoDone!=='undefined'?_todoDone:false;

  let items=D.todos.filter(t=>showDone?t.done:!t.done);
  if(filter==='yulchon') items=items.filter(t=>t.cat==='yulchon');
  if(filter==='sales') items=items.filter(t=>t.cat==='sales');
  if(filter==='personal') items=items.filter(t=>t.cat==='personal');

  // Sort: urgent first, then by due date
  items.sort((a,b)=>{
    const pa={high:0,normal:1,low:2}[a.priority||'normal'];
    const pb={high:0,normal:1,low:2}[b.priority||'normal'];
    if(pa!==pb)return pa-pb;
    if(a.due&&b.due)return a.due.localeCompare(b.due);
    if(a.due)return -1; if(b.due)return 1;
    return 0;
  });

  const urgentCount=D.todos.filter(t=>!t.done&&t.due&&diffDays(t.due)<=2).length;

  return`<div style="padding:10px 14px 90px">
  <!-- 헤더 + 추가 버튼 -->
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
    <div style="flex:1">
      <div style="font-size:16px;font-weight:800;color:var(--text)">할 일</div>
      <div style="font-size:12px;color:var(--text3)">${D.todos.filter(t=>!t.done).length}건 진행중${urgentCount>0?` · <span style="color:var(--r);font-weight:700">⚠️ ${urgentCount}건 긴급</span>`:''}
      </div>
    </div>
    <button onclick="openTodoModal()" style="padding:9px 16px;background:var(--g);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">＋ 추가</button>
  </div>

  <!-- 필터 탭 -->
  <div style="display:flex;gap:6px;margin-bottom:10px">
    ${[['all','전체'],['yulchon','🏛️ 율촌'],['sales','📢 영업'],['personal','👤 개인']].map(([k,l])=>
      `<button onclick="_todoFilter='${k}';renderContent()" 
        style="padding:7px 14px;border-radius:20px;border:1.5px solid ${filter===k?'var(--g)':'var(--border)'};background:${filter===k?'var(--gl)':'#fff'};color:${filter===k?'var(--g2)':'var(--text3)'};font-size:13px;font-weight:${filter===k?'700':'500'};cursor:pointer;font-family:inherit">${l}</button>`
    ).join('')}
    <button onclick="_todoDone=!_todoDone;renderContent()" 
      style="margin-left:auto;padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:${showDone?'var(--grayl)':'#fff'};color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit">
      ${showDone?'진행중 보기':'완료 보기'}
    </button>
  </div>

  <!-- 할일 목록 -->
  ${items.length===0
    ?`<div class="empty-state">✅<br>${showDone?'완료된 할일 없음':'할일이 없습니다'}</div>`
    :items.map(t=>renderTodoItem(t)).join('')
  }
</div>`;}

function diffDays(due){
  if(!due)return 999;
  const now=new Date();now.setHours(0,0,0,0);
  const d=new Date(due);d.setHours(0,0,0,0);
  return Math.round((d-now)/(1000*60*60*24));
}

function dueBadge(due){
  if(!due)return '';
  const d=diffDays(due);
  let txt='',color='';
  if(d<0){txt=`D+${Math.abs(d)} 초과`;color='var(--r)';}
  else if(d===0){txt='D-Day';color='var(--r)';}
  else if(d<=2){txt=`D-${d}`;color='var(--o)';}
  else{txt=`D-${d}`;color='var(--text3)';}
  return`<span style="font-size:11px;font-weight:700;color:${color}">${txt}</span>`;
}

function renderTodoItem(t){
  const m=t.matterId?D.matters.find(x=>x.id===t.matterId):null;
  const pColor={high:'var(--r)',normal:'var(--b)',low:'var(--text3)'}[t.priority||'normal'];
  const pLabel={high:'높음',normal:'보통',low:'낮음'}[t.priority||'normal'];
  const isOverdue=t.due&&diffDays(t.due)<0&&!t.done;

  return`<div style="background:#fff;border-radius:14px;padding:14px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid ${isOverdue?'var(--r)':'var(--border)'};${isOverdue?'border-left:3px solid var(--r)':''}">
  <div style="display:flex;align-items:flex-start;gap:10px">
    <!-- 체크박스 -->
    <button onclick="toggleTodoDone('${t.id}')" style="width:24px;height:24px;border-radius:50%;border:2px solid ${t.done?'var(--g)':'var(--border)'};background:${t.done?'var(--g)':'transparent'};flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px">
      ${t.done?'<span style="color:#fff;font-size:12px">✓</span>':''}
    </button>
    <!-- 내용 -->
    <div style="flex:1;min-width:0">
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:5px;${t.done?'text-decoration:line-through;opacity:.5':''}">${t.title}</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:${t.note||t.link?'6px':'0'}">
        <span style="font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;background:${t.cat==='yulchon'?'var(--gl)':t.cat==='sales'?'var(--ol)':'var(--bl)'};color:${t.cat==='yulchon'?'var(--g2)':t.cat==='sales'?'var(--o)':'var(--b)'}">
          ${t.cat==='yulchon'?'🏛️ 율촌':t.cat==='sales'?'📢 영업':'👤 개인'}
        </span>
        ${m?`<span style="font-size:11px;color:var(--text3);background:var(--grayl);padding:2px 8px;border-radius:10px">${m.code}</span>`:''}
        <span style="font-size:11px;font-weight:600;color:${pColor}">●  ${pLabel}</span>
        ${t.due?dueBadge(t.due):''}
      </div>

/* ═══ 명함 스캔 (AI) ═══ */
async function scanBusinessCard(){
  if(!CFG.anthropicKey){
    alert('설정(⚙️)에서 Anthropic API Key를 먼저 입력해주세요.');
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const scanBtn = document.getElementById('scanCardBtn');
    if(scanBtn){scanBtn.textContent='⏳ 인식 중...';scanBtn.disabled=true;}
    try {
      const b64 = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const mediaType = (file.type&&file.type.startsWith('image/'))?file.type:'image/jpeg';

      // Use XMLHttpRequest (more compatible with iOS Safari than fetch for CORS)
      const result = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', 'https://api.anthropic.com/v1/messages');
        xhr.setRequestHeader('Content-Type', 'application/json');
        xhr.setRequestHeader('x-api-key', CFG.anthropicKey);
        xhr.setRequestHeader('anthropic-version', '2023-06-01');
        xhr.setRequestHeader('anthropic-dangerous-direct-browser-access', 'true');
        xhr.timeout = 30000;
        xhr.onload = () => {
          if(xhr.status >= 200 && xhr.status < 300){
            try { resolve(JSON.parse(xhr.responseText)); }
            catch(e){ reject(new Error('파싱 오류: '+xhr.responseText.slice(0,100))); }
          } else {
            reject(new Error('HTTP '+xhr.status+': '+xhr.responseText.slice(0,150)));
          }
        };
        xhr.onerror = () => reject(new Error('네트워크 오류 - VPN 확인해주세요'));
        xhr.ontimeout = () => reject(new Error('시간 초과 (30초)'));
        xhr.send(JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: [
              {type:'image', source:{type:'base64', media_type:mediaType, data:b64}},
              {type:'text', text:'Extract info from this business card. Return ONLY JSON: {"name":"","title":"","dept":"","company":"","mobile":"","tel":"","email":"","wechat":"","kakao":"","address":""}'}
            ]
          }]
        }));
      });

      const text = (result.content&&result.content[0]&&result.content[0].text)||'';
      if(!text) throw new Error('빈 응답. result='+JSON.stringify(result).slice(0,100));

      let info = {};
      const js = text.indexOf('{');
      const je = text.lastIndexOf('}');
      if(js>=0 && je>js){
        info = JSON.parse(text.slice(js, je+1));
      } else {
        throw new Error('JSON 없음: '+text.slice(0,100));
      }

      const sv=(id,v)=>{const el=document.getElementById(id);if(el&&v)el.value=v;};
      sv('ct_name',info.name); sv('ct_title',info.title);
      sv('ct_dept',info.dept); sv('ct_company',info.company);
      sv('ct_mobile',info.mobile); sv('ct_tel',info.tel);
      sv('ct_email',info.email); sv('ct_wechat',info.wechat);
      sv('ct_kakao',info.kakao); sv('ct_addr',info.address);

      if(scanBtn){scanBtn.textContent='✅ 인식 완료!';scanBtn.disabled=false;}
      setTimeout(()=>{if(scanBtn)scanBtn.textContent='📷 명함 스캔';},2500);

    } catch(err){
      console.error('Scan error:',err);
      alert('인식 실패\n\n'+err.message);
      if(scanBtn){scanBtn.textContent='📷 명함 스캔';scanBtn.disabled=false;}
    }
  };
  input.click();
}

function stopTimer(){
  if(!timerObj)return;
  const mins=Math.round((Date.now()-timerObj.startMs)/60000);
  clearInterval(timerIv);timerIv=null;
  if(mins>0)openEntryModal(timerObj.matterId,mins);
  timerObj=null;
  renderTimerBanner();
}

function renderTimerBanner(){
  const b=document.getElementById('timerBanner');
  if(!timerObj){if(b)b.style.display='none';clearInterval(timerIv);timerIv=null;return;}
  if(b)b.style.display='flex';
  const m=D.matters.find(x=>x.id===timerObj.matterId);
  const tl=document.getElementById('tLbl');
  if(tl)tl.textContent=m?m.name:'타이머';
  if(!timerIv){
    timerIv=setInterval(()=>{
      const tt=document.getElementById('tTime');
      if(tt&&timerObj){const s=Math.floor((Date.now()-timerObj.startMs)/1000);tt.textContent=String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor(s%3600/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
    },1000);
  }
}

function quickSelectMatter(mid){
  // 빠른 선택: 드롭다운 동기화 + 버튼 하이라이트
  const sel=document.getElementById('em');
  if(sel)sel.value=mid;
  // 모든 quick 버튼 스타일 초기화
  document.querySelectorAll('[id^="qm_"]').forEach(btn=>{
    const isSelected=btn.id==='qm_'+mid;
    btn.style.borderColor=isSelected?'var(--g)':'var(--border)';
    btn.style.background=isSelected?'var(--gl)':'var(--white)';
    // 체크 아이콘
    const check=btn.querySelector('.qm-check');
    if(check)check.style.display=isSelected?'inline':'none';
  });
  updateMH(mid);
  // 날짜 입력으로 포커스 이동
  setTimeout(()=>document.getElementById('et')?.focus(),100);
}
function onMC(sel){updateMH(sel.value);}
function updateMH(mid){const el=document.getElementById('mhint');if(!el)return;const m=D.matters.find(x=>x.id===mid);if(!m){el.innerHTML='';return;}const mt=MTYPE[m.type||'time-b'];const mst=MSTATUS[m.status||'active'];el.innerHTML=`<div style="font-size:11px;margin-bottom:9px;padding:6px 10px;border-radius:9px;background:var(--bg)"><span class="tag ${mt.tagCls}" style="margin-right:5px">${mt.ico} ${mt.label}</span><span class="tag ${mst.tagCls}">${mst.label}</span></div>`;}
function updConv(){const m=parseMins(document.getElementById('et')?.value);const el=document.getElementById('conv');if(el)el.textContent=m>0?'→ '+hhmm(m):'';}
function saveEntry(eid){const mins=parseMins(document.getElementById('et').value);const mid=document.getElementById('em').value;if(!mid)return alert('Matter를 선택하세요');if(!mins)return alert('시간을 입력하세요\n예: 1.5 / 1:30 / 90');const e={id:eid||gid(),matterId:mid,date:document.getElementById('ed').value,minutes:mins,description:document.getElementById('edesc').value.trim(),billable:document.getElementById('ebill').checked};if(eid)D.entries=D.entries.map(x=>x.id===eid?e:x);else D.entries.unshift(e);cloudSave('entry',e);closeModal();renderAll();if(curTab===2)setTimeout(applyF,100);}

    const payByCurT={};(D.payments||[]).filter(p=>{const m=D.matters.find(x=>x.id===p.matterId);return m&&['active','closed'].includes(m.status)&&(mid==='all'||m.id===mid);}).forEach(p=>{payByCurT[p.currency||'KRW']=(payByCurT[p.currency||'KRW']||0)+parseFloat(p.amount||0);});
    rows.push(['합계','','','','','','','','','',activeM.reduce((a,m)=>a+toKRW(getRetainerBase(m).amount||0,getRetainerBase(m).currency),0),retT,'',Object.entries(payByCurT).map(([c,a])=>fmtM(a,c)).join('+'),activeM.reduce((a,m)=>a+(D.payments||[]).filter(p=>p.matterId===m.id).reduce((s,p)=>s+(p.krw_amount||0),0),0),payT,Math.max(0,retT-payT),'','']);

// 인센티브 리포트 Excel (3시트)
function exportIncentiveXLSX(){
  const wb=XLSX.utils.book_new();
  const yr=new Date().getFullYear();

  // ── 시트1: 수임·입금 현황 ──
  const activeM=D.matters.filter(m=>['active','closed','prospect'].includes(m.status));
  const hdr1=['코드','Matter명','유형','상태','의뢰인','수임금액','수임통화','수임KRW','입금KRW','미입금KRW','입금진행률'];
  const rows1=activeM.map(m=>{
    const rb=getRetainerBase(m);
    const ret=retainerKRW(m);
    const pay=paymentKRW(m);
    const mt=MTYPE[m.type||'time-b'];
    const mst=MSTATUS[m.status||'active'];
    const unpaid=Math.max(0,ret-pay);
    const pct=ret>0?Math.round(pay/ret*100):0;
    return[m.code,m.name,mt.label,mst.label,m.client||'',rb.amount||0,rb.currency||'KRW',ret,pay,unpaid,pct+'%'];
  });
  const retTotal=activeM.reduce((a,m)=>a+retainerKRW(m),0);
  const payTotal=activeM.reduce((a,m)=>a+paymentKRW(m),0);
  rows1.push(['합계','','','','','','',retTotal,payTotal,Math.max(0,retTotal-payTotal),'']);
  const ws1=XLSX.utils.aoa_to_sheet([hdr1,...rows1]);
  ws1['!cols']=hdr1.map((_,i)=>({wch:[10,28,10,10,16,12,8,14,14,14,8][i]||12}));
  XLSX.utils.book_append_sheet(wb,ws1,'수임·입금 현황');

  // ── 시트2: 성공보수 현황 ──
  const contM=D.matters.filter(m=>m.contingency_amount&&!['failed','internal'].includes(m.status));
  const hdr2=['코드','Matter명','상태','의뢰인','성공보수금액','통화','성공보수KRW','조건'];
  const rows2=contM.map(m=>{
    const amt=parseFloat(m.contingency_amount||0);
    const krw=toKRW(amt,m.retainer_cur||'KRW');
    return[m.code,m.name,MSTATUS[m.status||'active'].label,m.client||'',amt,m.retainer_cur||'KRW',krw,m.contingency_note||''];
  });
  const contTotal=contM.reduce((a,m)=>a+toKRW(parseFloat(m.contingency_amount||0),m.retainer_cur||'KRW'),0);
  rows2.push(['합계','','','','','',contTotal,'']);
  const ws2=XLSX.utils.aoa_to_sheet([hdr2,...rows2]);
  ws2['!cols']=hdr2.map((_,i)=>({wch:[10,28,10,14,14,8,14,24][i]||12}));
  XLSX.utils.book_append_sheet(wb,ws2,'성공보수');

  // ── 시트3: 시간 기록 요약 ──
  const entries=[...D.entries].sort((a,b)=>a.date.localeCompare(b.date));
  const hdr3=['날짜','코드','Matter명','의뢰인','업무내용','소요(분)','소요(시간)','청구가능'];
  const rows3=entries.map(e=>{
    const m=D.matters.find(x=>x.id===e.matterId)||{};
    return[e.date,m.code||'',m.name||'',m.client||'',e.description||e.desc||'',e.minutes,+(e.minutes/60).toFixed(2),e.billable?'Y':'N'];
  });
  const totalMins=entries.reduce((a,e)=>a+e.minutes,0);
  const billMins=entries.filter(e=>e.billable).reduce((a,e)=>a+e.minutes,0);
  rows3.push(['합계','','','','',totalMins,+(totalMins/60).toFixed(2),'']);
  rows3.push(['청구가능 합계','','','','',billMins,+(billMins/60).toFixed(2),'Y']);
  const ws3=XLSX.utils.aoa_to_sheet([hdr3,...rows3]);
  ws3['!cols']=[{wch:12},{wch:10},{wch:28},{wch:14},{wch:36},{wch:8},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws3,'시간 기록');

  // Show download modal
  const fname=`LegalTrack_인센티브리포트_${today()}.xlsx`;
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  showDownloadModal(url,fname,'📊 인센티브 리포트',[
    '시트1: 수임·입금 현황 ('+D.matters.filter(m=>["active","closed","prospect"].includes(m.status)).length+'건)',
    '시트2: 성공보수 현황',
    '시트3: 시간 기록 전체'
  ]);
}

// 수임액/입금액 Excel 내보내기 (조회 화면용)
function exportMoneyXLSX(){
  const wb=XLSX.utils.book_new();
  let matters=[];
  let sheetName='';
  if(_moneyType==='retainer'){
    matters=D.matters.filter(m=>['active','closed','prospect'].includes(m.status)&&retainerKRW(m)>0);
    sheetName='수임액';
  } else if(_moneyType==='payment'){
    matters=D.matters.filter(m=>paymentKRW(m)>0);
    sheetName='입금액';
  } else {
    matters=D.matters.filter(m=>m.contingency_amount&&!['failed','internal'].includes(m.status));
    sheetName='성공보수';
  }
  const hdr=['코드','Matter명','상태','의뢰인','금액','통화','KRW환산'];
  const rows=matters.map(m=>{
    const rb=getRetainerBase(m);
    const mst=MSTATUS[m.status||'active'];
    const krw=_moneyType==='payment'?paymentKRW(m):_moneyType==='contingency'?toKRW(parseFloat(m.contingency_amount||0),m.retainer_cur||'KRW'):retainerKRW(m);
    const amt=_moneyType==='payment'?paymentKRW(m):_moneyType==='contingency'?parseFloat(m.contingency_amount||0):rb.amount||0;
    const cur=_moneyType==='payment'?'KRW':_moneyType==='contingency'?(m.retainer_cur||'KRW'):rb.currency||'KRW';
    return[m.code,m.name,mst.label,m.client||'',amt,cur,krw];
  });
  const ws=XLSX.utils.aoa_to_sheet([hdr,...rows]);
  ws['!cols']=[{wch:10},{wch:28},{wch:10},{wch:16},{wch:14},{wch:8},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,sheetName);
  const fname=`LegalTrack_${sheetName}_${today()}.xlsx`;
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  showDownloadModal(url,fname,'📊 '+sheetName,[matters.length+'건']);
}

// 시간 조회 Excel 내보내기
function exportTimeXLSX(from,to){
  const wb=XLSX.utils.book_new();
  let rows=[...D.entries];
  const selM=typeof _tqMatter!=='undefined'?_tqMatter:'all';
  if(selM!=='all')rows=rows.filter(e=>e.matterId===selM);
  if(from)rows=rows.filter(e=>e.date>=from);
  if(to)rows=rows.filter(e=>e.date<=to);
  rows.sort((a,b)=>a.date.localeCompare(b.date));
  const hdr=['날짜','코드','Matter명','의뢰인','업무내용','소요(분)','소요(시간)','청구가능'];
  const data=rows.map(e=>{
    const m=D.matters.find(x=>x.id===e.matterId)||{};
    return[e.date,m.code||'',m.name||'',m.client||'',e.description||e.desc||'',e.minutes,+(e.minutes/60).toFixed(2),e.billable?'Y':'N'];
  });
  const tot=rows.reduce((a,e)=>a+e.minutes,0);
  data.push(['합계','','','','',tot,+(tot/60).toFixed(2),'']);
  const ws=XLSX.utils.aoa_to_sheet([hdr,...data]);
  ws['!cols']=[{wch:12},{wch:10},{wch:28},{wch:14},{wch:36},{wch:8},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws,'시간기록');
  const fname=`LegalTrack_시간기록_${from||'all'}_${to||'all'}.xlsx`;
  const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
  const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url=URL.createObjectURL(blob);
  showDownloadModal(url,fname,'⏱ 시간 기록',[
    '총 '+rows.length+'건의 시간 기록',
    '합계 '+hhmm(rows.reduce((a,e)=>a+e.minutes,0))
  ]);
}

function doBackupDownload(){const backup={version:1,exportedAt:new Date().toISOString(),cfg:{usdKrw:CFG.usdKrw,cnyKrw:CFG.cnyKrw},data:D};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(backup,null,2)],{type:'application/json'}));a.download=`LegalTrack_backup_${today()}.json`;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function handleDrop(e){e.preventDefault();document.getElementById('dz').classList.remove('drag');const f=e.dataTransfer.files[0];if(f)processBackupFile(f);}
function handleBackupFile(inp){if(inp.files[0])processBackupFile(inp.files[0]);}
function processBackupFile(file){const st=document.getElementById('restoreStatus');if(st)st.innerHTML='<div class="ibox">읽는 중...</div>';const reader=new FileReader();reader.onload=function(e){try{const backup=JSON.parse(e.target.result);let restored=backup.version===1&&backup.data?backup.data:(backup.matters||backup.entries?backup:null);if(!restored||!Array.isArray(restored.matters))throw new Error('올바른 백업 파일이 아닙니다');if(!confirm(`복원하시겠습니까?\nMatters: ${restored.matters.length}건 | 기록: ${(restored.entries||[]).length}건 | 입금: ${(restored.payments||[]).length}건\n⚠️ 현재 데이터가 교체됩니다.`))return;D={matters:restored.matters||[],entries:restored.entries||[],payments:restored.payments||[]};localSave();if(backup.cfg){if(backup.cfg.usdKrw)CFG.usdKrw=backup.cfg.usdKrw;if(backup.cfg.cnyKrw)CFG.cnyKrw=backup.cfg.cnyKrw;saveCFG();}if(st)st.innerHTML=`<div class="gbox">✅ 복원 완료! Matters ${D.matters.length}건, 기록 ${D.entries.length}건</div>`;setTimeout(()=>{closeModal();renderAll();},1500);}catch(err){if(st)st.innerHTML=`<div class="rbox">❌ 오류: ${err.message}</div>`;}};reader.readAsText(file);}

function renderTierInputs(){

function updateTier(i,field,val){
  var tier=incentiveTiers[i+1];if(!tier)return;
  if(field===0)tier.threshold=Math.round(parseFloat(val||0)*100000000);
  else tier.rate=parseFloat(val||0);
  tier.label=(tier.threshold/100000000)+'억 이상 '+tier.rate+'%';
}
function addTier(){incentiveTiers.push({threshold:0,rate:0,label:'새 구간'});const el=document.getElementById('tierInputs');if(el)el.innerHTML=renderTierInputs();}
function removeTier(i){incentiveTiers.splice(i+1,1);const el=document.getElementById('tierInputs');if(el)el.innerHTML=renderTierInputs();}
function saveSettings(){
  incentiveTiers.sort((a,b)=>a.threshold-b.threshold);
  CFG.usdKrw=parseFloat(document.getElementById('cfgUsd').value)||1380;
  CFG.cnyKrw=parseFloat(document.getElementById('cfgCny').value)||190;
  CFG.ghToken=(document.getElementById('ghToken')?.value||'').trim();
  CFG.anthropicKey=(document.getElementById('cfgAnthropicKey')?.value||'').trim();
  CFG.supaUrl=(document.getElementById('sbUrl').value||'').trim().replace(/\/$/,'');
  CFG.supaKey=(document.getElementById('sbKey').value||'').trim();saveCFG();closeModal();
  if(CFG.ghToken){ghLoad().then(()=>renderAll());}
  else if(CFG.supaUrl){syncCloud().then(renderAll);}
  else{renderAll();}
}

/* ── Global event delegation ── v7 ── */
document.addEventListener('click', function(e) {
  let el = e.target;
  // Walk up DOM tree to find data-* handler
  for(let i=0; i<5 && el && el!==document; i++, el=el.parentElement){
    const d = el.dataset;
    if(!d) continue;
    // Query mode selector
    if(d.qmode!==undefined){
      _queryMode=d.qmode;
      if(d.qmode==='time'){_timePresetQ=d.qextra||'month';}
      else if(d.qmode==='money'){_moneyType=d.qextra||'retainer';}
      renderContent(); return;
    }
    // Time preset tabs
    if(d.preset!==undefined){setTimePreset(d.preset); return;}
    // Money type tabs  
    if(d.moneytype!==undefined){_moneyType=d.moneytype;renderContent(); return;}
    // Apply custom time
    if(d.applytime!==undefined){applyCustomTime(); return;}
    // Matter select change - handled by change event below
  }
}, false);

// Handle select changes via delegation
document.addEventListener('change', function(e) {
  const el = e.target;
  if(el.dataset.tqmatter){_tqMatter=el.value;_queryMode='time';renderContent();}
  else if(el.dataset.mqstatus){_mqStatus=el.value;renderContent();}
  else if(el.dataset.mqtype){_mqType=el.value;renderContent();}
}, false);

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init);}else{init();}
