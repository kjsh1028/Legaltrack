<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LegalTrack">
<title>LegalTrack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
:root{--green:#1A6B4A;--green-light:#E8F4EE;--green-mid:#0F4F35;--bg:#F2F1EC;--white:#FFFFFF;--text:#1A1A1A;--text2:#666;--text3:#999;--border:#E8E8E4;--card-shadow:0 1px 4px rgba(0,0,0,.07)}
html,body{height:100%;background:var(--bg);font-family:'Noto Sans KR',-apple-system,sans-serif;color:var(--text);overflow:hidden}
#app{height:100dvh;max-width:430px;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);position:relative}

/* Header */
.hdr{background:var(--green);color:#fff;padding:52px 20px 18px;flex-shrink:0}
.hdr-row{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.02em}
.hdr-date{font-size:12px;opacity:.75;margin-left:auto}
.hdr-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.hs{background:rgba(255,255,255,.15);border-radius:10px;padding:8px 4px;text-align:center}
.hs-val{font-size:16px;font-weight:700;display:block;line-height:1.1}
.hs-lbl{font-size:10px;opacity:.8;margin-top:2px;display:block}

/* Timer banner */
.timer-banner{background:var(--green-light);border-bottom:1px solid #c8e6d4;padding:9px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.t-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.4s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
.t-label{font-size:12px;color:var(--green);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-time{font-family:monospace;font-size:13px;font-weight:700;color:var(--green);margin-right:8px}
.t-stop{background:var(--green);color:#fff;border:none;border-radius:16px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}

/* Content */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 90px}

/* Tab bar */
.tabbar{position:absolute;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,16px);padding-bottom:max(env(safe-area-inset-bottom),16px);flex-shrink:0}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 0;cursor:pointer;border:none;background:none;gap:3px;font-family:inherit}
.tb-ico{font-size:24px;line-height:1;color:var(--text3);transition:color .15s}
.tb-lbl{font-size:10px;color:var(--text3);font-weight:500;transition:color .15s}
.tb.on .tb-ico,.tb.on .tb-lbl{color:var(--green)}
.tb-center{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 0 0;cursor:pointer;border:none;background:none;gap:3px;font-family:inherit}
.tb-center-ico{width:46px;height:46px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:26px;line-height:1;margin-top:-14px;box-shadow:0 4px 12px rgba(26,107,74,.4)}
.tb-center-lbl{font-size:10px;color:var(--text3);font-weight:500}

/* Cards */
.card{background:var(--white);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:var(--card-shadow)}
.card-ttl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}

/* Stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.sc{background:var(--bg);border-radius:14px;padding:14px 12px}
.sc-lbl{font-size:11px;color:var(--text3);line-height:1.4;margin-bottom:6px}
.sc-val{font-size:26px;font-weight:700;line-height:1}
.sc-unit{font-size:11px;color:var(--text3);margin-top:3px}
.c-green{color:var(--green)}
.c-blue{color:#2D7DD2}
.c-orange{color:#D4711A}

/* Add button */
.add-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;font-family:inherit;box-shadow:0 3px 10px rgba(26,107,74,.3)}
.add-btn:active{opacity:.85;transform:scale(.99)}
.add-btn-outline{background:var(--white);color:var(--green);border:1.5px solid var(--green);box-shadow:none}

/* Entry */
.entry{padding:11px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.entry:last-child{border-bottom:none}
.e-dot{width:9px;height:9px;border-radius:50%;background:var(--green);margin-top:4px;flex-shrink:0}
.e-body{flex:1;min-width:0}
.e-code{font-size:11px;font-weight:700;color:var(--green);background:var(--green-light);padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:4px}
.e-desc{font-size:13px;color:var(--text);line-height:1.4;margin-bottom:4px;word-break:break-all}
.e-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.e-time{font-size:13px;font-weight:700;color:var(--text);margin-left:auto;white-space:nowrap}
.bill-tag{font-size:10px;background:var(--green-light);color:var(--green);padding:1px 6px;border-radius:10px}
.e-actions{display:flex;gap:2px;flex-shrink:0}
.ico-btn{background:none;border:none;cursor:pointer;padding:5px;font-size:18px;color:#ccc;line-height:1}

/* Matter card */
.mc{background:var(--white);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--card-shadow)}
.mc-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mc-badge{background:var(--green-light);color:var(--green);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;flex-shrink:0}
.mc-name{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-stats{display:flex;gap:12px;margin-bottom:10px}
.mc-stat{font-size:12px;color:var(--text3)}
.mc-stat b{font-weight:600;color:var(--text);margin-left:3px}
.mc-btns{display:flex;gap:8px;flex-wrap:wrap}
.mbtn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-family:inherit}
.mbtn:active{opacity:.7}
.mbtn.primary{background:var(--green);border-color:var(--green);color:#fff}
.mbtn.running{background:var(--green-light);border-color:var(--green);color:var(--green)}

/* Bar chart */
.week-wrap{display:flex;gap:4px;align-items:flex-end;height:80px;margin-bottom:6px}
.wc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.wb{width:100%;background:var(--green);border-radius:4px 4px 0 0;min-height:2px;transition:height .4s}
.wd{font-size:10px;color:var(--text3);text-align:center}
.wv{font-size:9px;color:var(--green);font-weight:700}
.bar-row{margin-bottom:10px}
.bar-row:last-child{margin-bottom:0}
.bar-lbl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bar-lbl b{color:var(--green);font-weight:700}
.bar-track{height:7px;background:var(--bg);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--green);border-radius:4px;transition:width .5s}

/* Empty */
.empty{text-align:center;padding:48px 0;color:var(--text3)}
.empty-ico{font-size:36px;display:block;margin-bottom:8px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-sheet{background:var(--bg);border-radius:24px 24px 0 0;padding:16px 16px;width:100%;max-width:430px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:max(env(safe-area-inset-bottom),24px)}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{font-size:11px;color:var(--text3);font-weight:600;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;font-size:16px;border:none;border-radius:12px;background:var(--white);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--green);outline-offset:-1px}
.field textarea{resize:none;line-height:1.5}
.hint{font-size:11px;color:var(--text3);margin-top:4px;padding-left:2px}
.converted{font-size:12px;color:var(--green);font-weight:700;margin-top:3px;padding-left:2px;min-height:16px}
.check-row{display:flex;align-items:center;gap:10px;padding:2px 0 13px}
.check-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.check-row label{font-size:15px;cursor:pointer}
.save-btn{width:100%;padding:15px;background:var(--green);border:none;border-radius:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 10px rgba(26,107,74,.3)}
.save-btn:active{opacity:.85}
.cancel-btn{width:100%;padding:13px;background:none;border:none;font-size:14px;color:var(--text3);cursor:pointer;font-family:inherit;text-align:center;margin-top:6px}
.warn-box{background:#FFF8E8;border-radius:12px;padding:11px 13px;font-size:12px;color:#B8750A;margin-bottom:14px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <span style="font-size:22px">⚖️</span>
      <span class="hdr-title">LegalTrack</span>
      <span class="hdr-date" id="hdrDate"></span>
    </div>
    <div class="hdr-stats" id="hdrStats"></div>
  </div>
  <div id="timerBanner" style="display:none" class="timer-banner">
    <div class="t-dot"></div>
    <span class="t-label" id="tLabel">타이머</span>
    <span class="t-time" id="tTime">00:00:00</span>
    <button class="t-stop" onclick="stopTimer()">■ 정지</button>
  </div>
  <div class="content" id="content"></div>
  <div class="tabbar">
    <button class="tb on" id="tb0" onclick="goTab(0)">
      <span class="tb-ico">📊</span>
      <span class="tb-lbl">대시보드</span>
    </button>
    <button class="tb" id="tb1" onclick="goTab(1)">
      <span class="tb-ico">📁</span>
      <span class="tb-lbl">Matters</span>
    </button>
    <button class="tb-center" onclick="openEntryModal()">
      <div class="tb-center-ico">＋</div>
      <span class="tb-center-lbl">입력</span>
    </button>
    <button class="tb" id="tb2" onclick="goTab(2)">
      <span class="tb-ico">📈</span>
      <span class="tb-lbl">리포트</span>
    </button>
    <button class="tb" id="tb3" onclick="openExportModal()">
      <span class="tb-ico">📥</span>
      <span class="tb-lbl">내보내기</span>
    </button>
  </div>
</div>
<div id="modalArea"></div>

<script>
const SK='lt_standalone_v1';
let D={matters:[],entries:[]};
let curTab=0;
let timerObj=null,timerIv=null;

function load(){
  try{const r=localStorage.getItem(SK);if(r)D=JSON.parse(r);}catch(e){}
  renderAll();
}
function save(){try{localStorage.setItem(SK,JSON.stringify(D));}catch(e){alert('저장 실패: '+e.message);}}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function today(){return new Date().toISOString().slice(0,10);}
function hhmm(m){if(!m)return'0m';const h=Math.floor(m/60),mm=m%60;return h>0?(mm>0?h+'h '+mm+'m':h+'h'):mm+'m';}
function parseMins(v){
  v=String(v||'').trim();if(!v)return 0;
  const hm=v.match(/^(\d+)[h:시간](\d*)m?$/i);if(hm)return parseInt(hm[1])*60+(parseInt(hm[2])||0);
  const f=parseFloat(v);if(!isNaN(f)&&f>0)return f<10?Math.round(f*60):Math.round(f);
  return 0;
}
function fmtDate(d){const dt=new Date(d+'T00:00:00');return(dt.getMonth()+1)+'월'+dt.getDate()+'일';}
function statsNow(){
  const now=new Date();
  const ws=new Date(now);ws.setDate(now.getDate()-now.getDay());ws.setHours(0,0,0,0);
  const ms=new Date(now.getFullYear(),now.getMonth(),1);
  return{
    today:D.entries.filter(e=>e.date===today()).reduce((s,e)=>s+e.minutes,0),
    week:D.entries.filter(e=>new Date(e.date+'T00:00:00')>=ws).reduce((s,e)=>s+e.minutes,0),
    month:D.entries.filter(e=>new Date(e.date+'T00:00:00')>=ms).reduce((s,e)=>s+e.minutes,0),
    total:D.entries.reduce((s,e)=>s+e.minutes,0)
  };
}

function renderAll(){
  const now=new Date();
  document.getElementById('hdrDate').textContent=
    now.getFullYear()+'년 '+(now.getMonth()+1)+'월 '+now.getDate()+'일';
  const s=statsNow();
  document.getElementById('hdrStats').innerHTML=
    [['오늘',hhmm(s.today)],['주간',hhmm(s.week)],['이번달',hhmm(s.month)],['Matters',D.matters.length]]
    .map(([l,v])=>`<div class="hs"><span class="hs-val">${v}</span><span class="hs-lbl">${l}</span></div>`).join('');
  renderTimerBanner();
  renderTab(curTab);
  for(let i=0;i<4;i++){const el=document.getElementById('tb'+i);if(el)el.classList.toggle('on',i===curTab);}
}

function renderTimerBanner(){
  const b=document.getElementById('timerBanner');
  if(!timerObj){b.style.display='none';return;}
  b.style.display='flex';
  const m=D.matters.find(x=>x.id===timerObj.matterId);
  document.getElementById('tLabel').textContent=m?`[${m.code}] ${m.name}`:'타이머 실행 중';
}

function startTimerTick(){
  clearInterval(timerIv);
  timerIv=setInterval(()=>{
    if(!timerObj)return;
    const s=Math.floor((Date.now()-timerObj.start)/1000);
    const h=Math.floor(s/3600),mm=Math.floor((s%3600)/60),ss=s%60;
    const el=document.getElementById('tTime');
    if(el)el.textContent=`${String(h).padStart(2,'0')}:${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  },1000);
}

function goTab(t){curTab=t;renderAll();}

function renderTab(t){
  const c=document.getElementById('content');
  if(t===0)c.innerHTML=renderDash();
  else if(t===1)c.innerHTML=renderMatters();
  else c.innerHTML=renderReport();
}

function renderDash(){
  const s=statsNow();
  const billable=D.entries.filter(e=>e.billable).reduce((s,e)=>s+e.minutes,0);
  const recent=[...D.entries].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,15);
  return`
<button class="add-btn" onclick="openEntryModal()">＋ 새 시간 기록</button>
<div class="stat-grid">
  <div class="sc"><div class="sc-lbl">이번달 누계</div><div class="sc-val c-green">${hhmm(s.month)}</div><div class="sc-unit">월간</div></div>
  <div class="sc"><div class="sc-lbl">이번주 누계</div><div class="sc-val c-blue">${hhmm(s.week)}</div><div class="sc-unit">주간</div></div>
  <div class="sc"><div class="sc-lbl">청구가능 시간</div><div class="sc-val c-green">${hhmm(billable)}</div><div class="sc-unit">Billable</div></div>
  <div class="sc"><div class="sc-lbl">전체 누계</div><div class="sc-val">${hhmm(s.total)}</div><div class="sc-unit">총 기록</div></div>
</div>
<div class="card">
  <div class="card-ttl">최근 기록</div>
  ${recent.length===0?'<div class="empty"><span class="empty-ico">🕐</span><div>기록이 없습니다</div></div>':
  recent.map(e=>{const m=D.matters.find(x=>x.id===e.matterId)||{code:'?',name:''};
    return`<div class="entry">
      <div class="e-dot"></div>
      <div class="e-body">
        <span class="e-code">${m.code}</span>
        <div class="e-desc">${e.desc||'<span style="color:#ccc">내용 없음</span>'}</div>
        <div class="e-meta">
          <span>${fmtDate(e.date)}</span>
          ${e.billable?'<span class="bill-tag">청구</span>':''}
          <span class="e-time">${hhmm(e.minutes)}</span>
        </div>
      </div>
      <div class="e-actions">
        <button class="ico-btn" onclick="editEntry('${e.id}')">✏️</button>
        <button class="ico-btn" onclick="delEntry('${e.id}')">🗑️</button>
      </div>
    </div>`;}).join('')}
</div>`;
}

function renderMatters(){
  return`
<button class="add-btn" onclick="openMatterModal()">＋ 새 Matter 추가</button>
${D.matters.length===0?`<div class="empty"><span class="empty-ico">📁</span><div>등록된 Matter가 없습니다</div></div>`:
D.matters.map(m=>{
  const mins=D.entries.filter(e=>e.matterId===m.id).reduce((s,e)=>s+e.minutes,0);
  const cnt=D.entries.filter(e=>e.matterId===m.id).length;
  const running=timerObj?.matterId===m.id;
  return`<div class="mc">
    <div class="mc-top">
      <span class="mc-badge">${m.code}</span>
      <span class="mc-name">${m.name}</span>
      <button class="ico-btn" onclick="delMatter('${m.id}')">🗑️</button>
    </div>
    ${m.client?`<div style="font-size:12px;color:var(--text3);margin-bottom:8px">의뢰인: ${m.client}</div>`:''}
    <div class="mc-stats">
      <div class="mc-stat">총<b>${hhmm(mins)}</b></div>
      <div class="mc-stat">건수<b>${cnt}건</b></div>
      ${m.rate?`<div class="mc-stat">₩<b>${Number(m.rate).toLocaleString()}/h</b></div>`:''}
    </div>
    <div class="mc-btns">
      ${running
        ?`<button class="mbtn running" onclick="stopTimer()">■ 타이머 정지</button>`
        :`<button class="mbtn" onclick="startTimer('${m.id}')" ${timerObj&&!running?'disabled style="opacity:.4"':''}>▶ 타이머</button>`}
      <button class="mbtn primary" onclick="openEntryModal('${m.id}')">＋ 기록 추가</button>
    </div>
  </div>`;}).join('')}`;
}

function renderReport(){
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toISOString().slice(0,10);
    const mins=D.entries.filter(e=>e.date===ds).reduce((s,e)=>s+e.minutes,0);
    days.push({lbl:['일','월','화','수','목','금','토'][d.getDay()],mins});
  }
  const maxD=Math.max(...days.map(d=>d.mins),1);
  const total=D.entries.reduce((s,e)=>s+e.minutes,0);
  const mRows=D.matters.map(m=>{
    const mins=D.entries.filter(e=>e.matterId===m.id).reduce((s,e)=>s+e.minutes,0);
    return{m,mins};
  }).filter(x=>x.mins>0).sort((a,b)=>b.mins-a.mins);

  return`
<div class="card">
  <div class="card-ttl">최근 7일</div>
  <div class="week-wrap">
    ${days.map(d=>`<div class="wc">
      <div class="wv">${d.mins>0?hhmm(d.mins):''}</div>
      <div class="wb" style="height:${Math.max(d.mins/maxD*56,d.mins>0?4:2)}px;opacity:${d.mins>0?1:.15}"></div>
      <div class="wd">${d.lbl}</div>
    </div>`).join('')}
  </div>
</div>
<div class="card">
  <div class="card-ttl">Matter별 시간</div>
  ${mRows.length===0?'<div style="color:var(--text3);font-size:13px;text-align:center;padding:10px 0">데이터 없음</div>':
  mRows.map(({m,mins})=>{
    const pct=total>0?Math.round(mins/total*100):0;
    return`<div class="bar-row">
      <div class="bar-lbl"><span>[${m.code}] ${m.name}</span><b>${hhmm(mins)}</b></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;}).join('')}
</div>`;
}

function startTimer(mid){
  if(timerObj)return;
  timerObj={matterId:mid,start:Date.now()};
  startTimerTick();renderTimerBanner();renderTab(curTab);
}
function stopTimer(){
  if(!timerObj)return;
  clearInterval(timerIv);timerIv=null;
  const mins=Math.max(1,Math.round((Date.now()-timerObj.start)/60000));
  const mid=timerObj.matterId;
  timerObj=null;renderTimerBanner();
  openEntryModal(mid,mins);
}

function delEntry(id){if(!confirm('이 기록을 삭제하시겠습니까?'))return;D.entries=D.entries.filter(e=>e.id!==id);save();renderAll();}
function editEntry(id){const e=D.entries.find(x=>x.id===id);if(e)openEntryModal(e.matterId,null,e);}
function delMatter(id){if(!confirm('Matter와 관련 기록이 모두 삭제됩니다.\n계속하시겠습니까?'))return;D.matters=D.matters.filter(m=>m.id!==id);D.entries=D.entries.filter(e=>e.matterId!==id);save();renderAll();}
function closeModal(){document.getElementById('modalArea').innerHTML='';}

function openEntryModal(mid,prefillMins,editObj){
  const opts=D.matters.map(m=>`<option value="${m.id}" ${(mid===m.id||editObj?.matterId===m.id)?'selected':''}>[${m.code}] ${m.name}</option>`).join('');
  let defT='';
  if(prefillMins!=null){const h=Math.floor(prefillMins/60),mm=prefillMins%60;defT=mm>0?`${h}:${String(mm).padStart(2,'0')}`:String(h);}
  else if(editObj){const h=Math.floor(editObj.minutes/60),mm=editObj.minutes%60;defT=mm>0?`${h}:${String(mm).padStart(2,'0')}`:String(h);}
  document.getElementById('modalArea').innerHTML=`
<div class="modal-bg" id="mbg" onclick="if(event.target===document.getElementById('mbg'))closeModal()">
<div class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title">${editObj?'기록 수정':'시간 기록 추가'}</div>
  ${D.matters.length===0?`<div class="warn-box">⚠️ 먼저 Matters 탭에서 Matter를 추가해 주세요.</div>`:''}
  <div class="field"><label>Matter *</label><select id="em">${opts||'<option value="">— Matter 없음 —</option>'}</select></div>
  <div class="field"><label>날짜 *</label><input id="ed" type="date" value="${editObj?.date||today()}"></div>
  <div class="field">
    <label>소요 시간 *</label>
    <input id="et" placeholder="1.5 / 1:30 / 90" value="${defT}" oninput="updConv()" inputmode="decimal">
    <div class="hint">1.5 = 1시간30분 &nbsp;|&nbsp; 1:30 = 1시간30분 &nbsp;|&nbsp; 90 = 90분</div>
    <div class="converted" id="conv"></div>
  </div>
  <div class="field"><label>업무 내용</label><textarea id="edesc" rows="3" placeholder="수행한 업무 내용을 입력하세요">${editObj?.desc||''}</textarea></div>
  <div class="check-row"><input type="checkbox" id="ebill" ${(editObj?.billable??true)?'checked':''}><label for="ebill">청구 가능 (Billable)</label></div>
  <button class="save-btn" onclick="saveEntry('${editObj?.id||''}')">저장</button>
  <button class="cancel-btn" onclick="closeModal()">취소</button>
</div></div>`;
  if(defT)updConv();
}
function updConv(){
  const m=parseMins(document.getElementById('et')?.value);
  const el=document.getElementById('conv');
  if(el)el.textContent=m>0?'→ '+hhmm(m):'';
}
function saveEntry(eid){
  const mins=parseMins(document.getElementById('et').value);
  const mid=document.getElementById('em').value;
  if(!mid)return alert('Matter를 선택하세요');
  if(!mins)return alert('시간을 입력하세요\n예: 1.5 / 1:30 / 90');
  const e={id:eid||gid(),matterId:mid,date:document.getElementById('ed').value,
    minutes:mins,desc:document.getElementById('edesc').value.trim(),
    billable:document.getElementById('ebill').checked,createdAt:Date.now()};
  if(eid)D.entries=D.entries.map(x=>x.id===eid?e:x);
  else D.entries.unshift(e);
  save();closeModal();renderAll();
}

function openMatterModal(){
  document.getElementById('modalArea').innerHTML=`
<div class="modal-bg" id="mbg" onclick="if(event.target===document.getElementById('mbg'))closeModal()">
<div class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title">새 Matter 추가</div>
  <div class="field"><label>Matter 코드 *</label><input id="mc" placeholder="예: ABC-2025-01" oninput="this.value=this.value.toUpperCase()" autocomplete="off"></div>
  <div class="field"><label>Matter 명 *</label><input id="mn" placeholder="예: ABC사 M&A 자문" autocomplete="off"></div>
  <div class="field"><label>의뢰인</label><input id="mcl" placeholder="의뢰인 이름 또는 회사명" autocomplete="off"></div>
  <div class="field"><label>시간당 보수 (₩, 선택)</label><input id="mr" type="number" placeholder="예: 500000" inputmode="numeric"></div>
  <button class="save-btn" onclick="saveMatter()">추가</button>
  <button class="cancel-btn" onclick="closeModal()">취소</button>
</div></div>`;
}
function saveMatter(){
  const code=document.getElementById('mc').value.trim();
  const name=document.getElementById('mn').value.trim();
  if(!code)return alert('코드를 입력하세요');
  if(!name)return alert('Matter 명을 입력하세요');
  D.matters.push({id:gid(),code,name,client:document.getElementById('mcl').value.trim(),rate:document.getElementById('mr').value||''});
  save();closeModal();curTab=1;renderAll();
}

function openExportModal(){
  const opts='<option value="all">전체 Matter</option>'+D.matters.map(m=>`<option value="${m.id}">[${m.code}] ${m.name}</option>`).join('');
  const first=D.entries.length?[...D.entries].sort((a,b)=>a.date.localeCompare(b.date))[0].date:'';
  document.getElementById('modalArea').innerHTML=`
<div class="modal-bg" id="mbg" onclick="if(event.target===document.getElementById('mbg'))closeModal()">
<div class="modal-sheet">
  <div class="modal-handle"></div>
  <div class="modal-title">CSV 내보내기</div>
  <div class="field"><label>시작 날짜</label><input id="xf" type="date" value="${first}"></div>
  <div class="field"><label>종료 날짜</label><input id="xt" type="date" value="${today()}"></div>
  <div class="field"><label>Matter 필터</label><select id="xm">${opts}</select></div>
  <button class="save-btn" onclick="doExport()">📥 CSV 다운로드</button>
  <button class="cancel-btn" onclick="closeModal()">취소</button>
</div></div>`;
}
function doExport(){
  const from=document.getElementById('xf').value,to=document.getElementById('xt').value,mid=document.getElementById('xm').value;
  const rows=D.entries.filter(e=>{
    if(from&&e.date<from)return false;if(to&&e.date>to)return false;
    if(mid&&mid!=='all'&&e.matterId!==mid)return false;return true;
  }).sort((a,b)=>a.date.localeCompare(b.date));
  if(rows.length===0)return alert('해당 조건의 기록이 없습니다');
  const hdr=['날짜','Matter 코드','Matter명','의뢰인','업무 내용','소요(분)','소요(시간)','청구가능'];
  const data=[hdr,...rows.map(e=>{const m=D.matters.find(x=>x.id===e.matterId)||{};
    return[e.date,m.code||'',m.name||'',m.client||'',e.desc||'',e.minutes,(e.minutes/60).toFixed(2),e.billable?'Y':'N'];
  })];
  const total=rows.reduce((s,e)=>s+e.minutes,0);
  data.push(['','','','','합계',total,(total/60).toFixed(2),'']);
  const csv='\uFEFF'+data.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`LegalTrack_${from||'all'}_${to||'all'}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  closeModal();
}

load();
</script>
</body>
</html>
